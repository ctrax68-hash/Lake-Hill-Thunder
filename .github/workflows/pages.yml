name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libglu1-mesa-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libxext-dev

      # The WASM build below reuses this native build's already-compiled bgfx
      # shader headers instead of cross-compiling shaderc to wasm -- see
      # cpp-port/CMakeLists.txt's own FATAL_ERROR guard/comment for why. This
      # step must run before the emcmake/emmake steps.
      - name: Configure and build native (generates shader headers)
        working-directory: cpp-port
        run: |
          cmake -B build
          cmake --build build -j$(nproc)

      - name: Set up Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 6.0.3

      - name: Configure and build WebAssembly
        working-directory: cpp-port
        run: |
          emcmake cmake -B build-web
          emmake cmake --build build-web -j$(nproc)

      # Assembles the deployed site: the C++/WASM build becomes the live game
      # at the root, and the original JS game moves to /legacy/ so it stays
      # reachable but is no longer the default.
      - name: Assemble site
        run: |
          mkdir -p site/icons site/legacy
          cp cpp-port/build-web/lht_port.html site/index.html
          cp cpp-port/build-web/lht_port.js site/
          cp cpp-port/build-web/lht_port.wasm site/
          cp cpp-port/build-web/manifest.json site/
          cp cpp-port/build-web/sw.js site/
          cp cpp-port/build-web/icons/* site/icons/
          cp index.html site/legacy/index.html
          cp -r vendor site/legacy/vendor

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
