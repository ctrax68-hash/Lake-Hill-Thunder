<!doctype html>
<!--
  Phase 7 (PORT_PROGRESS.md): minimal Emscripten shell for lht_port's
  WebAssembly build. Deliberately bare -- Emscripten's own default
  --shell-file bundles a progress bar / status text box that's irrelevant
  here.

  Phase 7b added the PWA installability wrapper: viewport meta (mobile
  rendering correctness), the manifest link, a favicon link (otherwise
  Chromium/Safari auto-request /favicon.ico and log a console 404 -- reusing
  icon-192.png here avoids a spurious extra asset), apple-touch-icon (what
  iOS Safari actually uses for the home-screen icon -- manifest.json's icons
  array is largely ignored there), theme-color, the apple-mobile-web-app-*
  trio, and the service-worker registration below. index.html itself
  (the immutable JS reference) is never touched -- these mirror its own
  existing viewport/apple-mobile-web-app-capable values where applicable,
  not new ad hoc choices.

  The <canvas id="canvas"> id is a hard requirement, not a style choice:
  bgfx's HTML5/Emscripten GL backend (bgfx/src/glcontext_html5.cpp) reads
  PlatformData::nwh back out as the literal C-string "#canvas" (set in
  main.cpp's __EMSCRIPTEN__ branch) and looks up the DOM element by that
  exact CSS selector.
-->
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Lake Hill Thunder</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Lake Hill Thunder">
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; outline: none; }
  #lht-fatal {
    display: none; position: fixed; inset: 0; z-index: 10;
    background: #000; color: #f55; font: 14px/1.5 monospace;
    padding: 24px; box-sizing: border-box; overflow: auto; white-space: pre-wrap;
  }
  /* Diagnostic build: a real device console isn't reachable here (no
     macOS/iOS Safari Web Inspector available in any sandbox this project
     has ever run in -- see PORT_PROGRESS.md), so this surfaces every
     stdout/stderr line -- including bgfx's own trace output, previously
     silently discarded by ScreenshotCallback::traceVargs() -- directly on
     the page. Non-blocking (small, top-anchored, semi-transparent) so it
     doesn't hide a working game once the real bug is found and fixed.
     Remove or gate behind a query param once this diagnostic pass is done. */
  #lht-log {
    position: fixed; top: 0; left: 0; right: 0; z-index: 9;
    max-height: 40vh; overflow: auto; margin: 0;
    background: rgba(0, 0, 0, 0.75); color: #6f6; font: 11px/1.4 monospace;
    padding: 6px 8px; box-sizing: border-box; white-space: pre-wrap;
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<div id="lht-fatal"></div>
<pre id="lht-log"></pre>
<script>
  // Without this, a failure before/during WASM init (WebGL2 context
  // creation failing, bgfx::init() returning false, an uncaught JS
  // exception) leaves the canvas exactly as blank as a normal loading
  // frame -- indistinguishable from "still loading" to whoever's holding
  // the device, and with no console visible on a phone there's no way to
  // learn why. This surfaces the actual reason on-screen instead.
  function lhtShowFatal(msg) {
    var el = document.getElementById('lht-fatal');
    if (el.style.display === 'block') return; // first error wins, don't overwrite it
    el.textContent = 'Lake Hill Thunder failed to start:\n\n' + msg;
    el.style.display = 'block';
  }

  var lhtLogEl = document.getElementById('lht-log');
  function lhtLog(line) {
    lhtLogEl.textContent += line + '\n';
    lhtLogEl.scrollTop = lhtLogEl.scrollHeight;
  }

  var canvas = document.getElementById('canvas');
  // Feature-detect on a throwaway canvas, not the real one -- calling
  // getContext('webgl2') on #canvas here would create a real WebGL2
  // context before bgfx/Emscripten ever gets to it, and a given canvas
  // can only ever be bound to one context in its lifetime. Avoids that
  // risk entirely rather than relying on same-type getContext() reuse
  // behaving identically across engines.
  if (!document.createElement('canvas').getContext('webgl2')) {
    lhtShowFatal(
      'This browser/device does not support WebGL2, which this game requires.\n' +
      'Try updating your browser, or use a recent desktop browser instead.'
    );
  }
  lhtLog('[lht] WebGL2 available: ' + !!document.createElement('canvas').getContext('webgl2'));

  window.addEventListener('error', function (e) {
    var msg = (e.message || String(e.error || e)) +
      (e.filename ? '\n(' + e.filename + ':' + e.lineno + ')' : '');
    lhtLog('[error] ' + msg);
    lhtShowFatal(msg);
  });
  window.addEventListener('unhandledrejection', function (e) {
    var msg = String((e.reason && e.reason.message) || e.reason);
    lhtLog('[unhandledrejection] ' + msg);
    lhtShowFatal(msg);
  });

  var Module = {
    canvas: canvas,
    onAbort: function (what) { lhtLog('[onAbort] ' + what); lhtShowFatal(String(what)); },
    print: function (text) { lhtLog(text); },
    printErr: function (text) { lhtLog('[stderr] ' + text); },
  };
  lhtLog('[lht] shell.html running, waiting for lht_port.js...');
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
{{{ SCRIPT }}}
</body>
</html>
