  // height overlay, same technique already used for the start/finish
  // checkers — no new coincident edge against the track surface below)
  const wallLat = pitOut - 0.35, wallH = 0.55, steps = 28;
  for(let i=0;i<steps;i++){
    const sa = s0 + seg0.len*(0.02 + 0.93*i/steps), sb = s0 + seg0.len*(0.02 + 0.93*(i+1)/steps);
    B.quad(crossPt(sa,wallLat), crossPt(sb,wallLat),
           crossPt(sb,wallLat,wallH), crossPt(sa,wallLat,wallH), COL.pitWall);
  }
  // numbered stall boxes, one per car, at the exact stall centers stepCar()
  // parks cars at (sStall = seg0.s0 + seg0.len*(0.18 + 0.55*idx/FIELD))
  const t = 0.12, boxLen = 3.2, boxW = 2.6, stallLat = -10.5;
  for(let idx=0; idx<FIELD; idx++){
    const sStall = s0 + seg0.len*(0.18 + 0.55*idx/FIELD);
    const lat0 = stallLat-boxW/2, lat1 = stallLat+boxW/2, sb0 = sStall-boxLen/2, sb1 = sStall+boxLen/2;
    B.quad(crossPt(sb0,lat0,0.012), crossPt(sb1,lat0,0.012), crossPt(sb1,lat0+t,0.012), crossPt(sb0,lat0+t,0.012), COL.pitStall);
    B.quad(crossPt(sb0,lat1-t,0.012), crossPt(sb1,lat1-t,0.012), crossPt(sb1,lat1,0.012), crossPt(sb0,lat1,0.012), COL.pitStall);
    B.quad(crossPt(sb0,lat0,0.012), crossPt(sb0+t,lat0,0.012), crossPt(sb0+t,lat1,0.012), crossPt(sb0,lat1,0.012), COL.pitStall);
    B.quad(crossPt(sb1-t,lat0,0.012), crossPt(sb1,lat0,0.012), crossPt(sb1,lat1,0.012), crossPt(sb1-t,lat1,0.012), COL.pitStall);
    const p = TRACK.pointAt(sb0-0.6);
    const tanX=Math.cos(p.hdg), tanZ=Math.sin(p.hdg), latX=-Math.sin(p.hdg), latZ=Math.cos(p.hdg);
    const basePt = pos3(sb0-0.6, stallLat);
    // lay the digits flat on the ground: local x -> along-track, local y ->
    // lateral, both real ground directions (unlike the pylon's use of this
    // same helper, which maps onto a vertical panel instead)
    const put = (x,y) => [ basePt[0] + tanX*x + latX*y, 0.02, basePt[2] + tanZ*x + latZ*y ];
    addNumber(B, idx+1, put, 1.4, 1.1, COL.pitStall);
    // ---- pit-box dressing: war wagon, tire stacks, pit-sign board ----
    // war wagon behind the stall (toward the infield, inside APRON_IN=-14)
    const wag = pos3(sStall, -13.0);
    const wx = tanX, wz = tanZ;                      // along-track unit vector
    B.box(wag[0]-Math.abs(wx)*0.8-Math.abs(latX)*0.45, 0, wag[2]-Math.abs(wz)*0.8-Math.abs(latZ)*0.45,
          wag[0]+Math.abs(wx)*0.8+Math.abs(latX)*0.45, 1.4, wag[2]+Math.abs(wz)*0.8+Math.abs(latZ)*0.45,
          [0.16,0.16,0.19]);
    B.box(wag[0]-Math.abs(wx)*0.45-Math.abs(latX)*0.3, 1.4, wag[2]-Math.abs(wz)*0.45-Math.abs(latZ)*0.3,
          wag[0]+Math.abs(wx)*0.45+Math.abs(latX)*0.3, 1.9, wag[2]+Math.abs(wz)*0.45+Math.abs(latZ)*0.3,
          COL.chrome);
    // two tire stacks at the stall's rear corner
    const ts1 = pos3(sb0-0.3, -12.2), ts2 = pos3(sb1+0.3, -12.2);
    B.box(ts1[0]-0.28, 0, ts1[2]-0.28, ts1[0]+0.28, 1.05, ts1[2]+0.28, COL.tire);
    B.box(ts2[0]-0.28, 0, ts2[2]-0.28, ts2[0]+0.28, 0.55, ts2[2]+0.28, COL.tire);
    // pit-sign board on a pole at the wall-side front corner
    const sp = pos3(sb1+0.4, -8.2);
    B.box(sp[0]-0.05, 0, sp[2]-0.05, sp[0]+0.05, 2.4, sp[2]+0.05, COL.chrome);
    const putSign = (x,y) => [ sp[0] + tanX*x, 2.0 + y, sp[2] + tanZ*x ];
    addNumber(B, idx+1, putSign, 0.85, 0.6, COL.pitStall);
    // crew figures: billboard quads sampling the crew atlas tile, doubled
    // back-to-back (same technique as the flag panel) since the world mesh
    // is single-sided
    const crewUV = atlasUV(ATLAS.crew);
    const cw3 = (crewUV[2]-crewUV[0])/3;
    for(let f=0; f<3; f++){
      const cb = pos3(sStall + (f-1)*1.1, -12.1);
      const hw = 0.32, hh = 1.35;
      const ax = cb[0]-tanX*hw, az = cb[2]-tanZ*hw;
      const bx = cb[0]+tanX*hw, bz = cb[2]+tanZ*hw;
      const u0 = crewUV[0]+cw3*f, u1 = crewUV[0]+cw3*(f+1);
      B.quadUV([ax,0,az],[bx,0,bz],[bx,hh,bz],[ax,hh,az],
        [u0,crewUV[3]],[u1,crewUV[3]],[u1,crewUV[1]],[u0,crewUV[1]]);
      B.quadUV([bx,0,bz],[ax,0,az],[ax,hh,az],[bx,hh,bz],
        [u1,crewUV[3]],[u0,crewUV[3]],[u0,crewUV[1]],[u1,crewUV[1]]);
    }
  }

  const pcx = pos3(s0-24, pitOut-4);
  B.box(pcx[0]-2.2, 0, pcx[2]-1.6, pcx[0]+2.2, 3.4, pcx[2]+1.6, COL.pitWall);
}
function addHillSilhouette(B){
  const R = 1400, N = 48, baseH = 0;

  for(let i=0;i<N;i++){
    const a0=i/N*Math.PI*2, a1=(i+1)/N*Math.PI*2;
    const x0=Math.cos(a0)*R, z0=Math.sin(a0)*R, x1=Math.cos(a1)*R, z1=Math.sin(a1)*R;
    const h0=50+rng2()*90, h1=50+rng2()*90;
    B.quad([x0,baseH,z0],[x1,baseH,z1],[x1,baseH+h1,z1],[x0,baseH+h0,z0], shade);
  }

function buildWorld(){
  const B = new Builder();
  const N = 460, dS = TRACK.total/N;
  const WALL_H = 1.35, FENCE_H = 0.85;
  const st = TRACK.stadium;
  const wallUV = atlasUV(ATLAS.wall), fenceUV = atlasUV(ATLAS.fence);
  // per-block (not per-slice) sponsor-vs-diamond decision so a sponsor panel
  // spans several consecutive wall slices instead of flickering slice-to-slice
  const SP_BLOCK = 10, spBlocks = [];
  for(let b=0;b<Math.ceil(N/SP_BLOCK);b++){
    spBlocks.push(rng2() < st.sponsorDensity ? Math.floor(rng2()*ATLAS.sponsor.count) : -1);
  }
  // pit road: a paved strip on the inside apron paralleling the frontstretch,
  // sized to hold both of the pit AI's real lanes (moving lane at lat=-8.4,
  // stall lane at lat=-10.5 — see stepCar()'s c.pit===2 branch) so the paint
  // always matches where cars actually go, with zero physics risk since this
  // only reads TRACK.segs[0], never writes anything AI/physics touches.
  const PIT_LEN = TRACK.segs[0].len, PIT_OUT = -7.2, PIT_IN = -11.8;
  const inPitZone = (sMid) => { let d=sMid; if(d>TRACK.total/2) d-=TRACK.total; return d>-22 && d<PIT_LEN*0.985; };
  for(let i=0;i<N;i++){
    const s0=i*dS, s1=(i+1)*dS;
    const inCor = Math.abs(TRACK.pointAt(s0+dS/2).curv) > 1e-6;
    // apron (inside), with a paved pit-road strip along the frontstretch —
    // split at the same slice breakpoints the rest of this loop already
    // uses, not a separately-tessellated overlay (avoids the coincident-edge
    // z-fighting this file has already hit twice with the wall cap/roof lip)
    if(inPitZone(s0+dS/2)){
      B.quad(crossPt(s0,APRON_IN), crossPt(s0,PIT_IN),
             crossPt(s1,PIT_IN), crossPt(s1,APRON_IN), COL.apron);
      B.quad(crossPt(s0,PIT_IN), crossPt(s0,PIT_OUT),
             crossPt(s1,PIT_OUT), crossPt(s1,PIT_IN), COL.pitRoad);
      B.quad(crossPt(s0,PIT_OUT), crossPt(s0,-TRACK.halfW),
             crossPt(s1,-TRACK.halfW), crossPt(s1,PIT_OUT), COL.apron);

    const lanes = [[-TRACK.halfW, -4.6, false],[-4.6, 0.8, true],[0.8, TRACK.halfW, false]];

    // so with backface culling on, the textured face was only ever visible
    // from OUTSIDE the wall — invisible from the driver's own chase cam,

      [faceUV[0],faceUV[1]],[faceUV[2],faceUV[1]],[faceUV[2],faceUV[3]],[faceUV[0],faceUV[3]]);
    // (no separate wall-cap shelf / outward "curtain" quad here — they used

  }
  if(st.jumbotron){
    const seg0 = TRACK.segs[0], seg2 = TRACK.segs[2];
    const cx = (seg0.A.x+seg0.B.x+seg2.A.x+seg2.B.x)/4, cz = (seg0.A.y+seg0.B.y+seg2.A.y+seg2.B.y)/4;
    jumboPos = [cx, cz];
    const JB_W = 14, JB_H = 8, baseH = 6;
    B.box(cx-0.4, 0, cz-0.4, cx+0.4, baseH, cz+0.4, COL.chrome);   // support pillar
    B.box(cx-JB_W/2, baseH, cz-1.0, cx+JB_W/2, baseH+JB_H, cz+1.0, [0.08,0.08,0.10]);  // screen bezel
    // "leaderboard" rows, facing the frontstretch. No back-face culling in
    // this scene, so the content is still visible (mirror-reversed) from the
    // far side too — a real second mirrored panel would need each digit's
    // internal shape re-authored, not just its position negated, so a single
    // front-facing panel is the pragmatic choice here.
    const rows = ROSTER.slice(0,5).map(r=>r.num);
    rows.forEach((num,i)=>{
      const rowY = baseH+JB_H*0.85 - i*1.3;
      const put = (x,y) => [ cx + x, rowY + y, cz + 1.05 ];
      addNumber(B, num, put, 4.2, 1.0, i===0 ? [0.95,0.85,0.1] : [0.85,0.9,0.95]);
    });
  }
  // scattered infield billboards/haulers for depth — kept clear of the jumbotron
  for(let i=0;i<10;i++){
    let s, p, tries=0;
    do {
      s = rng2()*TRACK.total;
      p = pos3(s, APRON_IN - 14 - rng2()*40);
      tries++;
    } while(jumboPos && Math.hypot(p[0]-jumboPos[0], p[2]-jumboPos[1]) < 25 && tries < 8);
    const w = 5+rng2()*7, h=2.5+rng2()*1.6, ang=rng2()*Math.PI;
    const dx=Math.cos(ang)*w/2, dz=Math.sin(ang)*w/2;
    const cc=[[0.85,0.85,0.88],[0.75,0.15,0.12],[0.15,0.35,0.7]][i%3];
    B.quad([p[0]-dx,0.2,p[2]-dz],[p[0]+dx,0.2,p[2]+dz],
           [p[0]+dx,0.2+h,p[2]+dz],[p[0]-dx,0.2+h,p[2]-dz], cc);
    B.quad([p[0]+dx,0.2,p[2]+dz],[p[0]-dx,0.2,p[2]-dz],
           [p[0]-dx,0.2+h,p[2]-dz],[p[0]+dx,0.2+h,p[2]+dz], cc);
  }
  return B.bake();
}

/* ---------- 7-segment number geometry ---------- */
const SEGBITS = {0:0b1110111,1:0b0100100,2:0b1011101,3:0b1101101,4:0b0101110,
                 5:0b1101011,6:0b1111011,7:0b0100101,8:0b1111111,9:0b1101111};
/* segments: 1=top 2=topL 4=topR 8=mid 16=botL 32=botR 64=bottom */
function addDigitQuads(B, n, ox, oy, w, h, put, col){
  const t = w*0.24, bits = SEGBITS[n];
  const seg = (x0,y0,x1,y1)=>{ // rect in digit-local 2D, mapped via put(x,y)->3D
    B.quad(put(ox+x0,oy+y0), put(ox+x1,oy+y0), put(ox+x1,oy+y1), put(ox+x0,oy+y1), col);
  };
  if(bits&1)  seg(t*0.5, h-t, w-t*0.5, h);
  if(bits&2)  seg(0, h/2+t*0.25, t, h-t*0.5);
  if(bits&4)  seg(w-t, h/2+t*0.25, w, h-t*0.5);
  if(bits&8)  seg(t*0.5, h/2-t/2, w-t*0.5, h/2+t/2);
  if(bits&16) seg(0, t*0.5, t, h/2-t*0.25);
  if(bits&32) seg(w-t, t*0.5, w, h/2-t*0.25);
  if(bits&64) seg(t*0.5, 0, w-t*0.5, t);
}
function addNumber(B, num, put, w, h, col){
  const s = String(num), dw = w/(s.length + (s.length-1)*0.22);
  let x = -w/2;
  for(const ch of s){
    addDigitQuads(B, +ch, x, -h/2, dw, h, put, col);
    x += dw*1.22;
  }
}

/* =====================================================================
   Gen-4 car: UV-unwrapped smooth-shaded loft + runtime-painted livery
   texture (the NT2003 approach: windows, shading, arches, numbers are
   all painted into a per-car skin).
   198in x 75in x 51in, 110in wheelbase, 60in angled spoiler.
   ===================================================================== */
const TX = 768;   // was 512 — bumped for sharper livery detail (numbers, decals,
                  // nose/tail masks, series bar) now sharing the one canvas;
                  // paintLivery()'s u()/v() helpers are fully TX-relative
/* loft stations: [x, halfWidth, beltY, yLow, roofY] — Gen-4 stock car silhouette:
   low wide nose, fender bulges over both axles (x=±1.395), pinched
   greenhouse, long raked windshield, fastback rear glass, long flat deck.
   beltY is the door/quarter-panel beltline height — it rises only gently and
   continuously from the fender to the decklid, the way a real character line
   does. roofY is an *additional* rise above the belt, used only across the
   greenhouse (cowl through fastback) so the cabin humps up on its own instead
   of the whole beltline (and the yellow panel below it) rising and falling
   with the roof. Everywhere else roofY == beltY (no extra rise). */
const CAR_ST = [
  [ 2.51, 0.50, 0.40, 0.13, 0.40 ],  // bumper cap (low, narrow, pointed nose tip)
  [ 2.34, 0.66, 0.485,0.11, 0.485],
  [ 2.04, 0.82, 0.585,0.11, 0.585],  // nose fascia — gradual taper into the fender, not a flare
  [ 1.70, 0.92, 0.685,0.12, 0.685],  // fender leading edge
  [ 1.40, 0.95, 0.735,0.14, 0.735],  // front axle — fender bulge (full 75in width)
  [ 1.05, 0.93, 0.795,0.16, 0.795],
  [ 0.68, 0.91, 0.89, 0.175,0.89 ],  // cowl / windshield base — belt and roof still equal here
  [ 0.34, 0.875,0.917,0.18, 1.10 ],  // windshield mid — belt keeps rising gently, roof rakes up
  [ 0.02, 0.835,0.942,0.185,1.22 ],  // A-pillar top
  [-0.60, 0.825,0.992,0.195,1.26 ],  // roof peak — more window/cabin presence
  [-1.00, 0.91, 1.023,0.20, 1.22 ],  // fastback glass start — kept close to the rear
                                      // axle/deck width so the quarter panel doesn't
                                      // pinch in right next to the wheel
  [-1.40, 0.95, 1.055,0.205,1.055],  // rear axle — quarter-panel bulge, belt/roof rejoin
  [-1.75, 0.92, 1.02, 0.205,1.02 ],  // deck start (flatter, taller deck per era proportions)
  [-2.10, 0.885,0.99, 0.19, 0.99 ],
  [-2.34, 0.845,0.955,0.32, 0.955],
  [-2.51, 0.76, 0.92, 0.50, 0.92 ]   // tail (spoiler base) — yL raised well above the
  // earlier 0.15/0.17: the tail cap fan's single apex sits at (beltY+yL)/2, so a low
  // yL put that apex ~0.4 units above the ring's bottom corners, and every fan rib
  // down to those corners read as a sharp inverted-V/pontoon-hull line dead-on from
  // behind. Raising yL here (tapered over the last two stations, not a sudden jump)
  // shortens that drop so the tail's underside reads as a flatter valance kick-up
  // instead of a boat-hull point.
];
/* ring cross-section fractions: [heightFrac, widthFrac] bottom-right→top→bottom-left */
const RINGF = [
  [0.00,0.76],[0.09,0.96],[0.28,1.00],[0.56,0.99],[0.80,0.885],[0.94,0.58],[1.00,0.22],
  [1.00,-0.22],[0.94,-0.58],[0.80,-0.885],[0.56,-0.99],[0.28,-1.00],[0.09,-0.96],[0.00,-0.76]
];
const NK = RINGF.length;
function carU(x){ return 0.02 + (2.51 - x)/5.02 * 0.76; }   // nose 0.02 → tail 0.78
function carV(k){ return 0.03 + k/(NK-1) * 0.94; }
// heightFrac at/below this rides the beltline curve (yLow -> beltY); above it
// rides the roof rise (beltY -> roofY). 0.80 matches RINGF's k=4, right where
// the side-glass band starts, so the glass sits exactly where the roof rise begins.
const SHOULDER = 0.80;
// wheel arch relief: verified numerically that only RINGF's k=0,1,2 (hf<=0.28)
// actually reach into the wheel's cylindrical volume near the hub — k=3 (hf=0.56)
// and above are already clear at every axle-adjacent station. Earlier attempts
// corrected a much taller band (up to the beltline/stripe height), which is what
// made the correction visible as a dent — the livery's accent stripe was painted
// right through the corrected zone. Restricting the fix to hf<=0.30 keeps it
// entirely below where any livery graphic is now drawn (moved to v>=0.26, see
// paintLivery), so the correction is invisible under normal paint.
//
// The wheel's rotation axis is Z (it's a barrel/coin standing on the X-Y plane),
// so its inner face (WHEEL_INNER_Z) fully spans the wheel's Y-radius uniformly —
// pulling a body point's Z below that threshold guarantees the wheel occludes
// it, without needing a true radial distance calc (which has no solution when
// the point's Y is already within the wheel's radius of its own center, since
// then no amount of Z motion alone reaches true 3D clearance).
const WHEEL_AXLE_X = [1.40, -1.40], WHEEL_NOTCH_RANGE = 0.45;
const WHEEL_INNER_Z = 0.62;
function ringPts(st){
  const [x,w,beltY,yL,roofY]=st;
  return RINGF.map(f=>{
    const hf=f[0];
    let py = hf<=SHOULDER ? yL+(hf/SHOULDER)*(beltY-yL)
                          : beltY+((hf-SHOULDER)/(1-SHOULDER))*(roofY-beltY);
    let pz = f[1]*w;
    if(hf <= 0.30) for(const wx of WHEEL_AXLE_X){
      const dx = Math.abs(x-wx);
      if(dx < WHEEL_NOTCH_RANGE && Math.abs(pz) > WHEEL_INNER_Z){
        const t = 1 - dx/WHEEL_NOTCH_RANGE;
        pz += (Math.sign(pz)*WHEEL_INNER_Z - pz)*t;
      }
    }
    return [x, py, pz];
  });
}
/* swatch texels for geometry parts */
const SW = { tire:[0.955,0.06], rim:[0.955,0.16], chrome:[0.955,0.26],
             dark:[0.955,0.36], amber:[0.955,0.46], shadow:[0.955,0.56],
             body:[0.955,0.66], exh:[0.955,0.76] };

// Shared (non-textured) car materials — identical for every car, so built
// once. Body paint and glass need a per-car livery THREE.CanvasTexture, so
// those two materials are created per-mesh in buildCarMesh() below instead.
let CAR_MAT_CHROME=null, CAR_MAT_TIRE=null, CAR_MAT_AMBER=null;
function carSharedMats(){
  if(!CAR_MAT_CHROME){
    CAR_MAT_CHROME = new THREE.MeshPhysicalMaterial({ color:0xc7c9cc, metalness:1.0, roughness:0.18 });
    CAR_MAT_TIRE = new THREE.MeshStandardMaterial({ color:0x0d0d10, roughness:0.95 });
    CAR_MAT_AMBER = new THREE.MeshStandardMaterial({ color:0xffb020, emissive:0xffb020, emissiveIntensity:1.2 });
  }
}
function buildCarMesh(num, pace, lod, sharedMats){
  const pos=[], nrm=[], uv=[];
  // LOD mesh: half the loft stations (always keeping the last, so the tail
  // cap still lands on the real end station) and no wheel geometry — used
  // past ~130 units where neither is resolvable, saving ~60-70% of a car's
  // triangles. Same carU()/UVs, so the one livery texture still fits both.
  const ST = lod ? CAR_ST.filter((_,i)=>i%2===0 || i===CAR_ST.length-1) : CAR_ST;
  const rings = ST.map(ringPts);
  // smooth per-vertex normals from surface tangents
  const NRM = rings.map((r,i)=> r.map((p,k)=>{
    const rp = rings[Math.min(rings.length-1,i+1)][k], rm = rings[Math.max(0,i-1)][k];
    const kp = r[Math.min(NK-1,k+1)], km = r[Math.max(0,k-1)];
    const tL = [rp[0]-rm[0], rp[1]-rm[1], rp[2]-rm[2]];      // along length
    const tR = [kp[0]-km[0], kp[1]-km[1], kp[2]-km[2]];      // around ring
    let n = v3norm(v3cross(tR, tL));
    const mid = (ST[i][2]+ST[i][3])/2;
    if(n[1]*(p[1]-mid) + n[2]*p[2] < 0) n=[-n[0],-n[1],-n[2]];
    return n;
  }));
  // group bookkeeping: each entry is a contiguous vertex range assigned to
  // one of the 5 PBR materials the plan calls for (replacing the old
  // per-vertex aSpec attribute, which Three's materials have no equivalent
  // for — every region that used to carry a distinct aSpec value already
  // corresponds to a distinct semantic car part, so grouping by part and
  // giving each an accurate fixed PBR material is a like-for-like swap).
  const groups = []; let gStart = 0;
  const MATI = { body:0, glass:1, chrome:2, tire:3, amber:4 };
  function endGroup(mat){ const n = pos.length/3; if(n>gStart) groups.push({start:gStart, count:n-gStart, mat:MATI[mat]}); gStart = n; }
  function vert(p, n, u, v){ pos.push(p[0],p[1],p[2]); nrm.push(n[0],n[1],n[2]); uv.push(u, v); }
  function quadS(i0,k0,i1,k1,i2,k2,i3,k3){                   // smooth loft quad
    const P=[[i0,k0],[i1,k1],[i2,k2],[i3,k3]];
    const tri=(a,b,c)=>{ for(const [i,k] of [a,b,c])
      vert(rings[i][k], NRM[i][k], carU(ST[i][0]), carV(k)); };
    tri(P[0],P[1],P[2]); tri(P[0],P[2],P[3]);
  }
  // main loft, split into two passes (body k-bands, then glass k-bands)
  // instead of one interleaved loop, so each ends up a single contiguous
  // vertex range — same quads, same math, just reordered so a Three.js
  // material group boundary can replace the old per-vertex aSpec blend.
  // Glass band matches paintLivery's GV0=0.335/GVH=0.330 window (carV(k)
  // for k=4..8 falls in/at the edge of [0.335,0.665]).
  const BODY_K = [0,1,2,3,9,10,11,12], GLASS_K = [4,5,6,7,8];
  for(let i=0;i<rings.length-1;i++) for(const k of BODY_K) quadS(i,k, i,k+1, i+1,k+1, i+1,k);
  endGroup('body');
  for(let i=0;i<rings.length-1;i++) for(const k of GLASS_K) quadS(i,k, i,k+1, i+1,k+1, i+1,k);
  endGroup('glass');
  // underbody strip (wrap seam) → dark/matte
  for(let i=0;i<rings.length-1;i++){
    const a=rings[i][NK-1], b=rings[i][0], c=rings[i+1][0], d=rings[i+1][NK-1];
    for(const p of [a,b,c, a,c,d]){ pos.push(p[0],p[1],p[2]); nrm.push(0,-1,0); uv.push(SW.dark[0],SW.dark[1]); }
  }
  endGroup('tire');
  // nose / tail cap fans → painted islands (body paint)
  function cap(i, cx2, fwd, isl){
    const r = rings[i], mid=(ST[i][2]+ST[i][3])/2;
    for(let k=0;k<NK-1;k++){
      const a=r[k], b=r[k+1];
      // winding reversed vs. the assigned (fwd,0,0) normal below (culled from
      // outside the car, showing background through the nose/tail — the
      // "back of the car is transparent" report). Three's default backface
      // culling goes by winding order, not the stored normal attribute.
      const tris = fwd>0 ? [[cx2,mid,0],b,a] : [[cx2,mid,0],a,b];
      for(const p of tris){
        pos.push(p===tris[0]?cx2:p[0], p===tris[0]?mid:p[1], p===tris[0]?0:p[2]);
        nrm.push(fwd,0,0);
        const zz = p===tris[0]?0:p[2], yy = p===tris[0]?mid:p[1];
        uv.push(isl[0] + zz/2.0*(-0.085*fwd), isl[1] + (mid-yy)/1.5*0.40);
      }
    }
  }
  cap(0, 2.56, 1, [0.845, 0.24]);            // nose island center
  cap(rings.length-1, -2.56, -1, [0.845, 0.74]);  // tail island
  endGroup('body');
  // helper for solid-swatch boxes/quads
  function q(a,b,c,d, sw){
    const u=v3sub(b,a), v=v3sub(c,a), n=v3norm(v3cross(u,v));
    for(const p of [a,b,c, a,c,d]){ pos.push(p[0],p[1],p[2]); nrm.push(n[0],n[1],n[2]); uv.push(sw[0],sw[1]); }
  }
  // shadow (skipped at LOD distance — a flat ground quad isn't resolvable
  // past ~130 units and isn't part of the car's own silhouette)
  if(!lod){
    q([-2.7,0.02,-1.15],[ 2.7,0.02,-1.15],[ 2.7,0.02, 1.15],[-2.7,0.02, 1.15], SW.shadow);
    endGroup('tire');
  }
  // spoiler (60 in angled blade) — the body loft is a rounded tube, not a flat
  // decklid, so a full-width blade at fixed height would float clear of the
  // quarter panels; narrow it to where the deck is actually near peak height,
  // and add small corner risers down to the deck so the mount reads as
  // intentional (real Gen-4 spoilers sit on short riser blocks) rather than
  // a detached plate floating over the trunk.
  {
    const z=0.50, x0=-2.42, y0=0.935, x1=-2.60, y1=1.16, th=0.03;
    q([x0,y0,-z],[x0,y0,z],[x1,y1,z],[x1,y1,-z], SW.body);
    endGroup('body');
    q([x0,y0-th, z],[x0,y0-th,-z],[x1,y1-th,-z],[x1,y1-th, z], SW.dark);
    q([x0,y0,-z],[x1,y1,-z],[x1,y1-th,-z],[x0,y0-th,-z], SW.dark);
    q([x1,y1, z],[x0,y0, z],[x0,y0-th, z],[x1,y1-th, z], SW.dark);
    const deckY = 0.865;                                     // deck surface under the spoiler root at x0
    for(const rz of [z, -z]){
      q([x0-0.05,deckY,rz-0.05],[x0-0.05,deckY,rz+0.05],[x0,y0,rz+0.05],[x0,y0,rz-0.05], SW.dark);
      q([x0-0.05,deckY,rz+0.05],[x0-0.05,deckY,rz-0.05],[x0-0.05,y0,rz-0.05],[x0-0.05,y0,rz+0.05], SW.dark);
    }
    endGroup('tire');
  }
  // right-side dual exhaust (LOD0 only — not resolvable at LOD distance):
  // two half-cylinder pipe stubs ahead of the rear axle, poking out past the
  // rocker on the right side (the window-net side is the left, per the v<0.5
  // = right-door convention used throughout this file). Grouped under 'body'
  // (not 'chrome') and sampling a new SW.exh swatch so they pick up a flat
  // dark-steel paint from the livery texture instead of CAR_MAT_CHROME's
  // mirror finish — real headers read as gunmetal, not polished chrome.
  if(!lod){
    function exhaustPipe(z0){
      const y0=0.26, r=0.055, segs=6, x0=-0.55, x1=-1.15;
      for(let k=0;k<segs;k++){
        const a0=-Math.PI/2 + k/segs*Math.PI, a1=-Math.PI/2 + (k+1)/segs*Math.PI;
        const c0=Math.cos(a0), s0=Math.sin(a0), c1=Math.cos(a1), s1=Math.sin(a1);
        const p0a=[x0, y0+s0*r, z0+c0*r], p1a=[x0, y0+s1*r, z0+c1*r];
        const p0b=[x1, y0+s0*r, z0+c0*r], p1b=[x1, y0+s1*r, z0+c1*r];
        const nm=[0, Math.sin((a0+a1)/2), Math.cos((a0+a1)/2)];
        for(const p of [p0a,p0b,p1b, p0a,p1b,p1a]){
          pos.push(p[0],p[1],p[2]); nrm.push(nm[0],nm[1],nm[2]); uv.push(SW.exh[0],SW.exh[1]);
        }
      }
    }
    exhaustPipe(0.74); exhaustPipe(0.90);
    endGroup('body');
  }
  if(pace){
    q([-0.45,1.29,-0.34],[0.05,1.29,-0.34],[0.05,1.29,0.34],[-0.45,1.29,0.34], SW.amber);
    q([-0.45,1.29,-0.34],[-0.45,1.42,-0.34],[0.05,1.42,-0.34],[0.05,1.29,-0.34], SW.amber);
    q([0.05,1.29,0.34],[-0.45,1.29,0.34],[-0.45,1.42,0.34],[0.05,1.42,0.34], SW.amber);
    q([0.05,1.29,-0.34],[0.05,1.42,-0.34],[0.05,1.42,0.34],[0.05,1.29,0.34], SW.amber);
    q([-0.45,1.42,-0.34],[-0.45,1.42,0.34],[0.05,1.42,0.34],[0.05,1.42,-0.34], SW.amber);
    endGroup('amber');
  }
  // wheels: tire barrel+face (all 4 wheels) in one pass, then rim+chrome hub
  // (all 4 wheels) in a second pass — same per-segment math as before, just
  // reordered by part so each material ends up one contiguous vertex range.
  const wR=0.34, wW=0.27, wz=0.80, WSEG=30;   // was 18 — rounder wheels, pairs with the new specular highlight on rim/chrome
  function wheelTire(cxp, sgn){
    const zo = sgn*(wz+wW/2), zi = sgn*(wz-wW/2);
    for(let k=0;k<WSEG;k++){
      const a0=k/WSEG*Math.PI*2, a1=(k+1)/WSEG*Math.PI*2;
      const p0=[cxp+Math.cos(a0)*wR, wR+Math.sin(a0)*wR, zo];
      const p1=[cxp+Math.cos(a1)*wR, wR+Math.sin(a1)*wR, zo];
      const q0=[p0[0],p0[1],zi], q1=[p1[0],p1[1],zi];
      const push=(pts,n2)=>{ for(const p of pts){ pos.push(p[0],p[1],p[2]);
        nrm.push(n2[0],n2[1],n2[2]); uv.push(SW.tire[0],SW.tire[1]); } };
      const rad=[Math.cos((a0+a1)/2),Math.sin((a0+a1)/2)];
      // winding reversed vs. the assigned radial/fn normals below (culled
      // from outside the wheel — see the cap() comment above for why).
      if(sgn>0) push([p0,q1,p1, p0,q0,q1],[rad[0],rad[1],0]);
      else      push([p1,q0,p0, p1,q1,q0],[rad[0],rad[1],0]);
      const fn=[0,0,sgn];
      const c=[cxp,wR,zo];
      if(sgn>0) push([c,p0,p1],fn); else push([c,p1,p0],fn);
    }
  }
  function wheelMetal(cxp, sgn){
    const zo = sgn*(wz+wW/2);
    const fn=[0,0,sgn];
    for(let k=0;k<WSEG;k++){
      const a0=k/WSEG*Math.PI*2, a1=(k+1)/WSEG*Math.PI*2;
      const push=(pts,sw)=>{ for(const p of pts){ pos.push(p[0],p[1],p[2]);

      const r0a=[cxp+Math.cos(a0)*wR*0.58, wR+Math.sin(a0)*wR*0.58, zo+0.004*sgn];
      const r1a=[cxp+Math.cos(a1)*wR*0.58, wR+Math.sin(a1)*wR*0.58, zo+0.004*sgn];
      if(sgn>0) push([[cxp,wR,zo+0.004],r0a,r1a],SW.rim); else push([[cxp,wR,zo-0.004],r1a,r0a],SW.rim);
      const h0=[cxp+Math.cos(a0)*wR*0.22, wR+Math.sin(a0)*wR*0.22, zo+0.008*sgn];
      const h1=[cxp+Math.cos(a1)*wR*0.22, wR+Math.sin(a1)*wR*0.22, zo+0.008*sgn];
      if(sgn>0) push([[cxp,wR,zo+0.008],h0,h1],SW.chrome); else push([[cxp,wR,zo-0.008],h1,h0],SW.chrome);
    }
  }
  // wheels are skipped entirely at LOD distance — not resolvable past ~130
  // units and the single biggest chunk of a full car's triangle budget
  // (4 wheels x 30 segments x (tire + rim + hub) geometry).
  if(!lod){
    wheelTire(1.395,1); wheelTire(1.395,-1); wheelTire(-1.395,1); wheelTire(-1.395,-1);
    endGroup('tire');
    wheelMetal(1.395,1); wheelMetal(1.395,-1); wheelMetal(-1.395,1); wheelMetal(-1.395,-1);
    endGroup('chrome');
  }

  carSharedMats();
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  geo.setAttribute('normal', new THREE.Float32BufferAttribute(nrm, 3));
  geo.setAttribute('uv', new THREE.Float32BufferAttribute(uv, 2));

  // therefore one livery texture upload) — passed in by ensureCarMesh() once
  // both meshes exist, instead of each level building its own materials.
  if(sharedMats){
    for(const g of groups) geo.addGroup(g.start, g.count, g.mat);

  const bodyMat = new THREE.MeshPhysicalMaterial({ clearcoat:1.0, clearcoatRoughness:0.1, metalness:0.35, roughness:0.45 });

  // transmission by rendering the opaque scene into an offscreen buffer as a
  // refraction source for every transmissive object, every frame. Measured
  // directly during the THREE-8 perf checkpoint: with 20 cars each carrying
  // a transmissive glass region, that alone cut frame time by more than
  // half on top of everything else in the scene. A dark, glossy, non-
  // transmissive material reads as tinted glass at chase-cam distance for a
  // fraction of the cost, so it stays off rather than re-tuned down.
  // No explicit `color` either (defaults to white, same as bodyMat) — the
  // livery texture already paints a dark tinted-glass look (window fill,
  // net weave, header banner); an extra dark base color here used to
  // multiply on top of that and crush it to a flat black void (the
  // "hollow" car complaint). Letting the texture alone drive the look,
  // like bodyMat does, keeps the window detail visible.
  // roughness was 0.05 (near-mirror) — under the bright sky envmap that made
  // the raked fastback rear glass catch a hard, oversized reflection reading
  // as a plain white "V" instead of the livery's dark tint showing through.
  // 0.4 still glints (real tinted glass isn't matte) without the mirror.
  const glassMat = new THREE.MeshPhysicalMaterial({ metalness:0.1, roughness:0.4, envMapIntensity:0.6 });
  const mats = [bodyMat, glassMat, CAR_MAT_CHROME, CAR_MAT_TIRE];
  if(pace) mats.push(CAR_MAT_AMBER);
  for(const g of groups) geo.addGroup(g.start, g.count, g.mat);
  return new THREE.Mesh(geo, mats);
}

/* ---------- livery painter (restricted API: fillRect/arc/transforms) ---------- */
// real vinyl-style lettering via canvas text (bold condensed sans, thick
// contrast outline for the car number) instead of a blocky pixel/7-seg font —
// reads like actual race-car numbering rather than a scoreboard display.
function drawNum(c2, num, cx2, cy2, hgt, fill, outline, rot, flipX, flipY){
  const s=String(num);
  c2.save();
  c2.translate(cx2, cy2);
  if(rot) c2.rotate(rot);
  c2.transform(flipX?-1:1, 0, -0.16, flipY?-1:1, 0, 0);       // italic lean + flips
  c2.font = '900 '+Math.round(hgt*1.3)+'px Arial, sans-serif';
  c2.textAlign='center'; c2.textBaseline='middle';
  c2.lineJoin='round'; c2.miterLimit=2; c2.lineWidth=hgt*0.22;
  c2.strokeStyle=outline; c2.strokeText(s, 0, 0);
  c2.fillStyle=fill; c2.fillText(s, 0, 0);
  c2.restore();
}
// small fictional manufacturer-style badge: solid oval + a bold contrasting
// center bar (roundel), used next to the shrunk deck-lid number. Bold fills
// instead of thin strokes so the shape survives at typical drafting distance
// (no external logo assets — purely procedural, same as the rest of the livery).
function drawBadge(c2, cx2, cy2, w, h, fill, bar, outline){
  c2.save();
  c2.translate(cx2, cy2);
  c2.beginPath(); c2.ellipse(0, 0, w/2, h/2, 0, 0, Math.PI*2);
  c2.fillStyle=fill; c2.fill();
  c2.lineWidth=h*0.16; c2.strokeStyle=outline; c2.stroke();
  c2.fillStyle=bar;
  c2.fillRect(-w*0.40, -h*0.17, w*0.80, h*0.34);
  c2.restore();
}
function drawWord(c2, txt, cx2, cy2, cell, color, rot, flipX, maxW){
  c2.save();
  c2.translate(cx2, cy2);
  if(rot) c2.rotate(rot);
  if(flipX) c2.transform(-1,0,0,1,0,0);
  let fs = Math.round(cell*7);
  c2.font = '700 '+fs+'px Arial, sans-serif';
  if(maxW){
    // shrink to fit so longer sponsor names never overflow their panel and
    // get cropped by the wheel arch or the edge of the body panel
    const w = c2.measureText(txt).width;
    if(w > maxW){ fs = Math.max(8, Math.floor(fs*maxW/w)); c2.font = '700 '+fs+'px Arial, sans-serif'; }
  }
  c2.textAlign='center'; c2.textBaseline='middle';
  c2.fillStyle=color; c2.fillText(txt, 0, 0);
  c2.restore();
}
const SPONSORS = ['LAKE HILL','TALON OIL','REDLINE COLA','IRONWOOD','COMET FUEL',
                  'STAMPEDE','NORTHSTAR','VULCAN TOOLS','CASCADE BREW','BLUE PEAK'];
const ACCENT2 = [CAR_PALETTE.white, CAR_PALETTE.black, CAR_PALETTE.yellow, CAR_PALETTE.red,
                 CAR_PALETTE.blue, CAR_PALETTE.green, CAR_PALETTE.orange, CAR_PALETTE.purple];
function mixC(a,b,t){ return [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t, a[2]+(b[2]-a[2])*t]; }
/* era-correct (2003-2005) flame lick: a tapering trail of overlapping circles
   curving off the nose along the lower fender — procedural, not traced artwork */
function drawFlameLick(c2x, baseU, baseV, len, amp, dir, col){
  c2x.fillStyle = col;
  const n = 9;
  for(let i=0;i<n;i++){
    const t = i/(n-1);
    const x = baseU + len*t;
    const y = baseV + dir*Math.sin(t*Math.PI*0.85)*amp*(1-t*0.25);
    const r = (1-t)*amp*0.85 + 3;
    c2x.beginPath(); c2x.arc(x,y,r,0,Math.PI*2); c2x.fill();
  }
}
function paintLivery(c2, body, accent, num, pace, idx){

function buildCarTexture(car, pace){

/* ---------- world atlas: crowd/wall-pattern/fence/sponsor-signage texture,
   painted once per track build (same canvas->GL-texture pattern as
   buildCarTexture above), repeats via UV so wall/fence tiles need no
   per-slice re-paint. Pylon/jumbotron numeric content is real 3D geometry
   (addNumber/addDigitQuads) instead — no atlas space needed for those. ---- */
const WX = 2048;   // was 1024 — doubled for sharper wall/fence/crowd/sponsor
                   // detail at the grazing chase-cam angles those tiles are
                   // almost always viewed at down a straight
const ATLAS = {
  wall:    {x:0,    y:0,    w:1024, h:512},
  fence:   {x:1024, y:0,    w:1024, h:512},
  crowd:   {x:0,    y:512,  w:1024, h:1024},
  sponsor: {x:0,    y:1536, w:2048, h:512, count:8},
  // pit-crew billboard figures — 3 figures side by side on a pit-concrete
  // background (the world shader has no alpha, so the quad blends into the
  // pit-box floor it stands on). Lives in the same otherwise-unused region
  // right of the crowd tile as the white texel below. Kept at its original
  // absolute pixel size when WX doubled (not scaled up with the other
  // tiles): paintCrewTile()'s figures are drawn at hardcoded absolute pixel
  // offsets, not w/h-relative, so doubling the tile without reworking that
  // function would just shrink the figures relative to their tile.
  crew:    {x:1040, y:530, w:96, h:64},
  // solid white texel for Builder's vertex-colored (non-atlas) triangles —
  // see the comment in Builder.prototype.tri. Sits in the region right of
  // the crowd tile (x:1024-2048, y:512-1536), which nothing else uses.
  white:   {x:2000, y:1500, w:8, h:8}
};
function atlasUV(r){
  // Inset a few texels from each tile's edge so geometry UVs never sample
  // the literal tile-boundary pixel — the gutter blur below intentionally
  // darkens those boundary rows/cols toward whichever neighboring tile is
  // there (to hide mip-level bleeding), so a UV that lands exactly on e.g.
  // the fence tile's bottom-left corner (touching both the wall seam and
  // the much darker crowd tile) samples that darkened corner directly. At
  // a grazing viewing angle a wall/fence quad's on-screen footprint can
  // shrink to a sliver dominated by that one corner texel, reading as a
  // crisp dark line right along the wall top.
  const INSET = 20;   // was 10 — doubled alongside WX so the inset consumes the same fraction of each tile
  return [(r.x+INSET)/WX, (r.y+INSET)/WX, (r.x+r.w-INSET)/WX, (r.y+r.h-INSET)/WX];
}
function atlasSponsorUV(i){
  const r = ATLAS.sponsor, tw = r.w/r.count;
  const x0 = r.x + i*tw;
  return [x0/WX, r.y/WX, (x0+tw)/WX, (r.y+r.h)/WX];
}
function paintWallPattern(c2, x, y, w, h, wallCol){
  const css=(a,m)=>'rgb('+Math.round(a[0]*255*(m||1))+','+Math.round(a[1]*255*(m||1))+','+Math.round(a[2]*255*(m||1))+')';
  const dark = mixC(wallCol, [0,0,0], 0.35);
  c2.save();
  c2.beginPath(); c2.rect(x,y,w,h); c2.clip();
  c2.fillStyle = css(wallCol); c2.fillRect(x,y,w,h);
  c2.translate(x+w/2, y+h/2); c2.rotate(Math.PI/4);
  c2.fillStyle = css(dark);
  const cell = h*0.28, n = Math.ceil((w+h)/cell)+2;
  for(let r=-n;r<n;r++) for(let k=-n;k<n;k++){
    if((r+k)%2===0) c2.fillRect(k*cell-w, r*cell-h, cell, cell);
  }
  c2.restore();
}
function paintFenceBand(c2, x, y, w, h){
  c2.fillStyle = 'rgb(118,120,124)'; c2.fillRect(x,y,w,h);
  c2.save();
  c2.beginPath(); c2.rect(x,y,w,h); c2.clip();
  c2.strokeStyle = 'rgb(205,207,210)'; c2.lineWidth = Math.max(1, h*0.05);
  const cell = h*0.34;
  for(let d=-h; d<w+h; d+=cell){
    c2.beginPath(); c2.moveTo(x+d,y); c2.lineTo(x+d+h,y+h); c2.stroke();
    c2.beginPath(); c2.moveTo(x+d,y+h); c2.lineTo(x+d+h,y); c2.stroke();
  }
  c2.restore();
}
function paintCrowdTile(c2, x, y, w, h, palette, fillProb){
  // empty-seat base color first, so a gap in the fill roll reads as bare
  // bleacher rather than another crowd color
  c2.fillStyle = 'rgb(38,38,42)'; c2.fillRect(x,y,w,h);
  const cell = 8, fp = fillProb==null ? 1 : fillProb;
  for(let py=y; py<y+h; py+=cell) for(let px=x; px<x+w; px+=cell){
    if(rng2() > fp) continue;
    const col = palette[Math.floor(rng2()*palette.length)];
    const m = 0.7 + rng2()*0.4;
    c2.fillStyle = 'rgb('+Math.round(col[0]*255*m)+','+Math.round(col[1]*255*m)+','+Math.round(col[2]*255*m)+')';

function paintCrewTile(c2, x, y, w, h){

  // (the world shader has no alpha channel — no transparent cutouts)
  c2.fillStyle = 'rgb(133,130,120)'; c2.fillRect(x,y,w,h);
  const fw = w/3;
  const suits = ['rgb(46,48,58)','rgb(120,28,26)','rgb(40,40,44)'];
  for(let i=0;i<3;i++){
    const cxm = x + i*fw + fw/2;
    c2.fillStyle = suits[i];
    c2.fillRect(cxm-6, y+18, 12, 26);                 // torso
    c2.fillRect(cxm-6, y+44, 5, 18);                  // legs
    c2.fillRect(cxm+1, y+44, 5, 18);
    c2.fillStyle = 'rgb(230,230,235)';
    c2.fillRect(cxm-4, y+6, 8, 10);                   // helmet
    c2.fillStyle = 'rgb(20,22,28)';
    c2.fillRect(cxm-4, y+9, 8, 4);                    // visor

function paintSponsorTiles(c2, x0, y0, w, h, count){
  const tw = w/count;
  for(let i=0;i<count;i++){
    const tx = x0 + i*tw, light = (i%2===0);
    c2.fillStyle = light ? 'rgb(232,232,236)' : 'rgb(18,18,22)';
    c2.fillRect(tx, y0, tw, h);
    c2.strokeStyle = 'rgb(10,10,12)'; c2.lineWidth = 8;   // was 4 — matches the doubled WX scale
    c2.strokeRect(tx+4, y0+4, tw-8, h-8);
    drawWord(c2, SPONSORS[i % SPONSORS.length], tx+tw/2, y0+h/2, h*0.085,

function paintWorldAtlas(){
  const cv = document.createElement('canvas');
  cv.width = WX; cv.height = WX;
  const c2 = cv.getContext('2d');
  c2.fillStyle = 'rgb(60,60,64)'; c2.fillRect(0,0,WX,WX);
  paintWallPattern(c2, ATLAS.wall.x, ATLAS.wall.y, ATLAS.wall.w, ATLAS.wall.h, TRACK.theme.wall);
  paintFenceBand(c2, ATLAS.fence.x, ATLAS.fence.y, ATLAS.fence.w, ATLAS.fence.h);
  paintCrowdTile(c2, ATLAS.crowd.x, ATLAS.crowd.y, ATLAS.crowd.w, ATLAS.crowd.h, TRACK.stadium.crowdPalette, TRACK.stadium.crowdFill);
  paintCrewTile(c2, ATLAS.crew.x, ATLAS.crew.y, ATLAS.crew.w, ATLAS.crew.h);
  paintSponsorTiles(c2, ATLAS.sponsor.x, ATLAS.sponsor.y, ATLAS.sponsor.w, ATLAS.sponsor.h, ATLAS.sponsor.count);
  // solid white texel Builder's vertex-colored (non-atlas) triangles sample —
  // see Builder.prototype.tri.
  c2.fillStyle = 'rgb(255,255,255)'; c2.fillRect(ATLAS.white.x, ATLAS.white.y, ATLAS.white.w, ATLAS.white.h);
  // gutter blur across the shared region boundaries so mipmap downsampling
  // doesn't bleed one region's color into its neighbor (wall|fence, the
  // wall/fence|crowd seam, and the crowd|sponsor seam) — done last, after
  // all regions are painted, so nothing overwrites it afterward.
  const gutter = (x,y,w,h) => { c2.save(); c2.beginPath(); c2.rect(x,y,w,h); c2.clip();
    c2.filter = 'blur(6px)'; c2.drawImage(cv, 0, 0); c2.filter = 'none'; c2.restore(); };
  gutter(ATLAS.wall.w-12, 0, 24, ATLAS.wall.h);                   // wall | fence vertical seam
  gutter(0, ATLAS.wall.h-12, WX, 24);                             // wall/fence | crowd horizontal seam
  gutter(0, ATLAS.sponsor.y-12, WX, 24);                          // crowd/unused | sponsor horizontal seam
  const tex = new THREE.CanvasTexture(cv);
  tex.colorSpace = THREE.SRGBColorSpace;
  // atlasUV()/atlasSponsorUV() author their rects assuming a top-left-origin
  // canvas (same as the old raw gl.texImage2D upload, which never set
  // UNPACK_FLIP_Y_WEBGL) — Three flips canvas textures on upload by default,
  // which would mirror every wall/fence/crowd/sponsor tile vertically.
  tex.flipY = false;
  // No mipmaps: this atlas packs several unrelated tiles (wall/fence/crowd/
  // sponsor) into one canvas, and browser mipmap generation box-filters the
  // whole image per level with no notion of tile boundaries. At the coarse
  // mip levels sampled when the wall/fence recedes to a sliver down a long
  // straight, that blends toward the dark crowd tile and reads as a crisp
  // dark line right along the wall top — confirmed by the line surviving
  // both a composer-bypass and tone-mapping test untouched (it's baked into
  // the texture sample, upstream of any post-processing). Padding the seams
  // (below) only helps at fine mips; going mipmap-less trades a little
  // grazing-angle shimmer for correctness.
  tex.generateMipmaps = false;
  tex.minFilter = THREE.LinearFilter;
  tex.magFilter = THREE.LinearFilter;
  // no mipmaps (see above), so anisotropic filtering is the only lever left
  // for the wall/fence/crowd/sponsor tiles' near-constant grazing-angle
  // viewing from the low chase cam — still real GPU-side benefit even
  // without a mip chain to sample from.
  tex.anisotropy = MAX_ANISO;
  // CLAMP (not REPEAT): this is a shared atlas packing several regions into
  // one texture, so wall/fence quads reuse one fixed UV rect per slice
  // (each slice already reproduces the same tile, giving a repeating look)
  // rather than letting U grow past the region's own bounds into a neighbor.
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.needsUpdate = true;
  return tex;
}

/* ---------- car transform: basis from track surface (interpolated pose) ---------- */
let RALPHA = 1;                                  // render alpha within current tick
function lerpAng(a,b,t){ let d=b-a; while(d>Math.PI)d-=2*Math.PI; while(d<-Math.PI)d+=2*Math.PI; return a+d*t; }
function lerpS(a,b,t){ let d=b-a; const T=TRACK.total;
  if(d>T/2)d-=T; if(d<-T/2)d+=T; let r=a+d*t; return ((r%T)+T)%T; }
function poseOf(c){
  const t = RALPHA;
  if(c.px===undefined) return {x:c.x, y:c.y, hdg:c.hdg, s:c.s, lat:c.lat};
  return { x: c.px+(c.x-c.px)*t, y: c.py+(c.y-c.py)*t,
           hdg: lerpAng(c.phdg, c.hdg, t), s: lerpS(c.ps, c.s, t),
           lat: c.plat+(c.lat-c.plat)*t };
}
function carModelMat(c){
  const P = poseOf(c);
  const th = P.hdg, b = TRACK.bankAt(P.s), cb=Math.cos(b), sb=Math.sin(b);
  const f = [Math.cos(th), 0, Math.sin(th)];                       // forward
  const latT = [-Math.sin(th)*cb, sb, Math.cos(th)*cb];
  let up = v3cross(latT, f);
  if(up[1] < 0) up = [-up[0],-up[1],-up[2]];
  up = v3norm(up);
  let fw = v3norm(v3cross(up, v3cross(f, up)));
  if(fw[0]*f[0]+fw[2]*f[2] < 0) fw=[-fw[0],-fw[1],-fw[2]];
  const pit = c.pitch||0;
  fw = v3norm([fw[0]+up[0]*pit, fw[1]+up[1]*pit, fw[2]+up[2]*pit]);
  const right = v3norm(v3cross(fw, up));
  const upF = v3cross(right, fw);
  const h = surfH(P.s, Math.max(APRON_IN, Math.min(WALL_LAT, P.lat)));
  return m4fromBasis(fw, upF, right, [P.x, h, P.y]);
}

/* ---------- particles (render-only: tire smoke, sparks, engine smoke) ---------- */
const rngP = mulberry32(4242);
const PARTS = [];
function spawnP(x,y,z, vx,vy,vz, life, size, col){
  if(PARTS.length > 220) PARTS.shift();
  PARTS.push({x,y,z,vx,vy,vz,life,age:0,size,col});
}
function emitFX(dt){
  if(S.mode==='menu' || S.mode==='menuwait') return;
  // crowd camera-flash sparkle: white flecks in the grandstands at the big
  // moments (green flag, one-to-go, final lap, victory). Render-side only —
  // reads S, spawns via the particle system's own rngP stream (already
  // separate from the rng/rngR gameplay streams), no gameplay effect.
  const bigMoment = S.greenT>0 || S.oneToGo || S.mode==='victory'
    || (S.mode==='race' && S.order[0] && S.order[0].lap===S.laps-1);
  if(bigMoment && STAND_ZONES.length){
    const rate = 6*dt;
    for(let n=Math.floor(rate) + (rngP()<rate%1 ? 1:0); n>0; n--){
      const z = STAND_ZONES[Math.floor(rngP()*STAND_ZONES.length)];
      const s = z.s0 + rngP()*(z.s1-z.s0);
      const lat = z.latB + rngP()*(z.latT-z.latB);
      const h = z.hB + rngP()*(z.hT-z.hB) + 0.4;
      const p = pos3(s, lat); p[1] += h;
      spawnP(p[0], p[1], p[2], 0,0,0, 0.12, 0.05, [1,1,0.95]);
    }
  }
  for(const c of S.cars){
    if(!c.slipFx && !c.hitFx && !(c.dmg>0.6)) continue;
    const M = carModelMat(c);
    const bx=M[12], by=M[13], bz=M[14];
    if(c.slipFx > 0){                                 // tire smoke off the rear
      for(let i=0;i<2;i++) if(rngP() < 0.7)
        spawnP(bx - M[0]*1.7 + (rngP()-0.5), by+0.2, bz - M[2]*1.7 + (rngP()-0.5),
          (rngP()-0.5)*2, 0.8+rngP()*0.8, (rngP()-0.5)*2, 0.55+rngP()*0.3, 0.17, [0.78,0.78,0.81]);
      c.slipFx = Math.max(0, c.slipFx - dt*3.5);
    }
    if(c.hitFx > 0){                                  // impact burst: sparks + gray puffs
      for(let i=0;i<4;i++){
        const spark = rngP() < 0.6;
        spawnP(bx+(rngP()-0.5)*1.6, by+0.4+rngP()*0.5, bz+(rngP()-0.5)*1.6,
          (rngP()-0.5)*8, 1+rngP()*4, (rngP()-0.5)*8,
          spark ? 0.3+rngP()*0.2 : 0.55+rngP()*0.35,
          spark ? 0.07 : 0.16,
          spark ? [1.0,0.82,0.35] : [0.60,0.60,0.62]);
      }
      c.hitFx = Math.max(0, c.hitFx - dt*2.5);
    }
    if(c.dmg > 0.6 && !c.out && c.v > 5 && rngP() < 0.4){   // wounded engine smoke trail
      spawnP(bx + M[0]*1.9, by+0.65, bz + M[2]*1.9,
        (rngP()-0.5), 0.7+rngP()*0.7, (rngP()-0.5), 0.9, 0.15, [0.38,0.38,0.40]);
    }
  }
  for(let i=PARTS.length-1;i>=0;i--){
    const p=PARTS[i]; p.age+=dt;
    if(p.age>=p.life){ PARTS.splice(i,1); continue; }
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt;
    p.vy += (p.size<0.15 ? -9.5 : 1.5)*dt;            // sparks fall, smoke rises
    p.vx*=0.96; p.vz*=0.96;
  }
}
let PARTICLE_TEX=null;
function buildParticleSprite(){          // soft radial-gradient billboard, replaces the flat unsoftened quad
  const s = 64;
  const cv2 = document.createElement('canvas'); cv2.width=s; cv2.height=s;
  const c2 = cv2.getContext('2d');
  const g = c2.createRadialGradient(s/2,s/2,0, s/2,s/2,s/2);
  g.addColorStop(0, 'rgba(255,255,255,1)');
  g.addColorStop(0.5, 'rgba(255,255,255,0.55)');
  g.addColorStop(1, 'rgba(255,255,255,0)');

  const tex = new THREE.CanvasTexture(cv2);
  tex.generateMipmaps = true;
  tex.minFilter = THREE.LinearMipmapLinearFilter;
  tex.magFilter = THREE.LinearFilter;
  tex.wrapS = tex.wrapT = THREE.ClampToEdgeWrapping;
  tex.needsUpdate = true;

}
/* THREE.Points-based particles: gl_PointSize billboards each point toward
   the camera automatically (same effect as the old renderer's manual
   R/Up-vector quad billboarding), so this only needs position/size/color
   attributes rewritten each frame from PARTS — emitFX/spawnP are untouched.
   A per-vertex size attribute needs a small custom shader (PointsMaterial
   only exposes one size for the whole batch); gl_PointSize is denominated
   in framebuffer pixels, so uPixelsPerUnit converts a world-space diameter
   at the point's view-space depth the same way the old billboard quads'
   world-space corners did, keeping particle size independent of FOV changes. */
const PART_CAP = 220;
const PARTICLE_VS = `
  attribute float aSize;
  attribute vec3 aColor;
  uniform float uPixelsPerUnit;
  varying vec3 vColor;
  void main(){
    vColor = aColor;
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    gl_PointSize = aSize * uPixelsPerUnit / max(0.001, -mv.z);
    gl_Position = projectionMatrix * mv;
  }`;
const PARTICLE_FS = `
  precision mediump float;
  varying vec3 vColor;
  uniform sampler2D uMap;
  uniform float uAlpha;

const cam = { pos:null, look:null };
let camFov = 60;        // smoothed FOV (speed/draft zoom, written in drawGL)
function setHardCam(pos, look){
  cam.pos = pos.slice(); cam.look = look.slice(); cam.t = performance.now();
  camera.position.set(pos[0],pos[1],pos[2]); camera.up.set(0,1,0);

function updateCamera(){
  const c = S.player;

  // opening of the pace lap
  if(S.mode==='pace' && S.t < 9 && S.cars.length > 1){
    if(S.t < 2.5){
      // phase 1: infield dolly along the frontstretch, looking out at the
      // main grandstand/flag stand so the venue reads before the grid sweep
      const f = S.t/2.5;
      const sC = TRACK.sFinish + 60 - f*110;
      const pC = pos3(sC, -34); pC[1] += 12 - f*4;
      const pL = pos3(TRACK.sFinish - f*30, WALL_LAT + 8); pL[1] += 7;
      return setHardCam(pC, pL);
    }
    // phase 2: the original grid sweep, front to back
    const lead = S.cars[0];
    const f = (S.t - 2.5)/6.5;
    const sc = lead.s + 14 - f*(24 + S.cars.length*5.6);
    const pC = pos3(sc, 9.0); pC[1] += 2.4;
    const pL = pos3(sc - 7, 0); pL[1] += 1.0;
    return setHardCam(pC, pL);
  }
  // pit-stop camera: locked front-quarter shot of the player's stall while
  // being serviced (hard cut in/out — broadcast grammar)
  if(S.player.pit === 2){
    const sSt = pitStallS(S.player);
    const pC = pos3(sSt + 6, -14); pC[1] += 2.3;
    const pL = pos3(sSt, -10.5);  pL[1] += 0.7;
    return setHardCam(pC, pL);
  }
  // caution TV-cut montage during the fast-forward window: hard cuts between
  // static trackside pads near the pace car every ~1.4s — the sped-up motion
  // reads as an intentional broadcast montage instead of a glitch. Drops out
  // at one-to-go so the chase cam carries the restart at normal speed.
  if(S.mode==='race' && S.flag==='yellow' && S.yellowT > 2.5 && !S.oneToGo){
    const shotIdx = Math.floor(performance.now()/1400);
    // anchor every shot to the middle of the forming queue so the field is
    // always in frame (fixed trackside pads could be 250+ units from the
    // action — cars became invisible dots)

    for(const o of S.cars){
      if(o.out || o.done || o.pit!==0) continue;
      let d = ((ref - o.s) % TRACK.total + TRACK.total) % TRACK.total;
      sSum += d; n++;
    }
    const midS = ref - (n ? sSum/n : 40);
    let pC, pL;
    switch(shotIdx % 3){
      case 0:   // wall-side "TV pad" abeam the pack
        pC = pos3(midS + 35, WALL_LAT + 12); pC[1] += 6; break;
      case 1:   // infield low angle

    // the wall/apron on a tight track like Milltown Bullring, especially
    // since the winner is often still near the start/finish line. Same
    // lateral clamp the regular chase cam uses below.

  const fw=[M[0],M[1],M[2]], up=[M[4],M[5],M[6]];
  const base=[M[12],M[13],M[14]];

  const tx = 12+SAFE.l, ty = 12+SAFE.t;

  const leaderboard = { x:tx, y:ty, w:tw, h:th, headH, rowH, list, pinned };

  // minimap cascades below the leaderboard so the two can never overlap;
  // if the touch controls leave less room than that, shrink the minimap
  // into what's left rather than moving it back up past the leaderboard.
  const ctlTop = H - ctlHeightPx() - Math.round(14*s) - SAFE.b;
  let mw = 108*s, mh = 64*s;
  const my = leaderboard.y + leaderboard.h + gap;
  if(my + mh + gap > ctlTop) mh = Math.max(38*s, ctlTop - gap - my);
  const minimap = { x:12+SAFE.l, y:my, w:mw, h:mh };

  const lw = 148*s, lh1 = 30*s, lh2 = 24*s;
  const lap = { x:W/2-lw/2, y:10*s+SAFE.t, w:lw, h:lh1 };
  const lastBest = { x:lap.x, y:lap.y+lh1+2*s, w:lw, h:lh2 };
  const bannerY = lastBest.y+lastBest.h+8*s;

  const pedalTop = H - ctlGasHeightPx() - Math.round(14*s) - SAFE.b;
  const spW = 92*s, spH = 68*s;
  const speed = { x: W-spW-16*s-SAFE.r, y: pedalTop-spH-6*s, w:spW, h:spH };

  // bottom-center stack: segmented status strip, with the merged
  // draft/spotter status chip riding just above it.
  const barW = 250*s, barH = 24*s;
  const statusBar = { x:W/2-barW/2, y:H-14*s-barH-SAFE.b, w:barW, h:barH };
  const chipH = 24*s;
  const statusChip = { y: statusBar.y-gap-chipH, h: chipH };

  return { leaderboard, minimap, lap, lastBest, bannerY, speed, statusBar, statusChip };
}
/* ---- segmented diagnostic bar: discrete blocks, not a smooth fill ---- */
function drawSegBar(x,y,w,h,frac,segN,color){
  const gap=2, segW=(w-gap*(segN-1))/segN;
  const filled = Math.round(Math.max(0,Math.min(1,frac))*segN);
  for(let i=0;i<segN;i++){
    cx.fillStyle = i<filled ? color : THEME.steel;
    cx.fillRect(x+i*(segW+gap), y, segW, h);
  }
}
/* ---- unified race-state banner: one visual treatment, one shared slide-in timer ---- */
let bannerState = { key:null, t0:0 };
/* ---- procedural flag icon: green / yellow(caution) / checkered(victory) ---- */
const FLAG_ICON = { pace:'yellow', caution:'yellow', onetogo:'yellow', green:'green', victory:'checkered', overtime:'green' };
const FLAG_GREEN = '#1F9D55';   // content-accurate flag color; UI chrome itself stays on-palette
function drawFlagIcon(x,y,s,pattern){
  cx.save();
  if(pattern==='checkered'){
    const n=4, cell=s/n;
    for(let r=0;r<n;r++) for(let cIdx=0;cIdx<n;cIdx++){
      cx.fillStyle = (r+cIdx)%2===0 ? THEME.white : THEME.black;
      cx.fillRect(x+cIdx*cell, y+r*cell, cell, cell);
    }
  } else {
    cx.fillStyle = pattern==='green' ? FLAG_GREEN : THEME.yellow;
    cx.fillRect(x,y,s,s);
  }
  cx.strokeStyle=THEME.white; cx.lineWidth=1; cx.strokeRect(x+0.5,y+0.5,s-1,s-1);
  cx.fillStyle=THEME.graycool; cx.fillRect(x-3,y,3,s);   // flagpole
  cx.restore();
}
function drawStateBanner(key, text, tone, y){
  if(bannerState.key !== key){ bannerState.key = key; bannerState.t0 = performance.now(); }
  const age = (performance.now()-bannerState.t0)/1000;
  const slide = Math.min(1, age/0.25);
  const ease = 1-(1-slide)*(1-slide);
  const icon = FLAG_ICON[key];
  const iconW = icon ? 26 : 0;
  const w = Math.max(220, text.length*11+70) + iconW, h=30;
  const yy = y - (1-ease)*24;
  cx.globalAlpha = ease;
  panel(W/2-w/2, yy, w, h, tone, 2);
  // brief flash right as the banner appears, plus a slow sustained pulse
  // while the state is actually active (caution flag up / victory) — both
  // just modulate the border glow, reusing the same age timer and tone
  // color already driving the rest of this banner (no parallel timer)
  const flash = Math.exp(-age*4) * Math.max(0, Math.sin(age*20));
  const sustained = (S.flag==='yellow' || S.mode==='victory') ? Math.sin(performance.now()/1000*2)*0.5+0.5 : 0;
  const glow = flash*10 + sustained*5;
  if(glow > 0.3){
    cx.save();
    cx.shadowColor = tone; cx.shadowBlur = glow;
    cx.strokeStyle = tone; cx.lineWidth = 2;
    sharpRect(W/2-w/2+0.5, yy+0.5, w-1, h-1); cx.stroke();
    cx.restore();
  }
  if(icon) drawFlagIcon(W/2-w/2+10, yy+7, 16, icon);
  cx.fillStyle = tone; cx.font="bold 15px 'Arial Narrow',sans-serif"; cx.textAlign='center';
  cx.fillText(text, W/2 + iconW/2, yy+h/2+1);
  cx.globalAlpha = 1;
}

  else if(S.mode==='victory') drawStateBanner('victory','CHECKERED FLAG!',THEME.yellow,L.bannerY);
  else bannerState.key = null;

let MMPTS=null, MM_BX=1, MM_BY=1;
function drawMinimap(box){
  const mw=box.w, mh=box.h, mx=box.x, my=box.y;
  if(!MMPTS){
    MMPTS=[]; let bx=1, by=1;
    for(let i=0;i<=140;i++){ const p=TRACK.pointAt(i/140*TRACK.total); MMPTS.push([p.x,p.y]);
      bx=Math.max(bx,Math.abs(p.x)); by=Math.max(by,Math.abs(p.y)); }
    MM_BX=bx; MM_BY=by;
  }
  panel(mx,my,mw,mh,THEME.white,1);
  const sc = Math.min((mw-18)/2/MM_BX, (mh-14)/2/MM_BY), ox=mx+mw/2, oy=my+mh/2;
  cx.strokeStyle=THEME.graycool; cx.lineWidth=2; cx.beginPath();
  MMPTS.forEach((p,i)=>{ const X=ox+p[0]*sc, Y=oy+p[1]*sc; i?cx.lineTo(X,Y):cx.moveTo(X,Y); });
  cx.closePath(); cx.stroke();
  for(const c of S.cars){
    cx.fillStyle = c.isPlayer ? THEME.yellow : colCSS(dispCol(c.col));
    cx.beginPath(); cx.arc(ox+c.x*sc, oy+c.y*sc, c.isPlayer?3.4:2.4, 0, Math.PI*2); cx.fill();

}
