/* ---------- main loop ---------- */
let last=0, acc=0;
const CAUTION_FF_RATE = 8;   // sim-seconds per real second once a caution has run its opening beat
function frame(ts){
  requestAnimationFrame(frame);
  if(!last){ last=ts; return; }
  let dt = Math.min(0.25, (ts-last)/1000); last=ts;
  if(S.mode==='race' || S.mode==='pace' || S.mode==='qual' || S.mode==='victory'){
    // fast-forward through the boring part of a caution: give the player a
    // couple of real seconds to register the yellow (S.yellowT still runs at
    // 1x during that window), then compress the rest of the wait so sitting
    // through the field bunching back up behind the pace car doesn't mean
    // minutes of real time. The actual restart always happens at normal
    // speed since S.flag flips to 'green' well before this check fires again.
    // fast-forward also carries through most of the one-to-go roll — the
    // leader controls the pace at ~38 for up to a full lap back to the line,
    // which at 1x is another 40+ real seconds of nothing. Drop to 1x only
    // for the final approach (leader within 250 units of the line) so the
    // player still watches the actual restart build at normal speed.
    // (the player's own pit service also runs at 1x — it's their broadcast
    // moment under the pit camera, and at 8x it was a sub-second blip)
    let ffOK = S.mode==='race' && S.flag==='yellow' && S.yellowT > 2.5 && S.player.pit!==2;
    if(ffOK && S.oneToGo){
      const lead0 = S.order[0];
      const dl0 = lead0 ? (TRACK.sFinish - lead0.s + TRACK.total) % TRACK.total : 0;
      if(dl0 < 250) ffOK = false;
    }
    const simDt = ffOK ? dt*CAUTION_FF_RATE : dt;
    acc += simDt;
    while(acc >= DT){ tick(); acc -= DT; }
    RALPHA = Math.max(0, Math.min(1, acc/DT));
  }
  if(S.shakeT>0) S.shakeT = Math.max(0, S.shakeT-dt);
  emitFX(dt);
  audioTick();
  if(S.mode!=='menu') drawGL();
  drawHUD();
}
function tick(){
  S.t += DT;
  // store previous poses for render interpolation
  for(const c of S.cars){ c.px=c.x; c.py=c.y; c.phdg=c.hdg; c.ps=c.s; c.plat=c.lat; }
  PACE.px=PACE.x; PACE.py=PACE.y; PACE.phdg=PACE.hdg; PACE.ps=PACE.s; PACE.plat=PACE.lat;
  if(S.mode==='pace'){
    stepPace();
    if(PACE.state!=='lead') S.paceV = Math.min(46, S.paceV + 3.4*DT);  // 70 mph → ~103 to the line
  }
  updateAero();
  for(const c of S.cars) stepCar(c);
  collide();
  S.order = S.cars.slice().sort((a,b)=> (b.done?1e6-b.finishT:b.prog) - (a.done?1e6-a.finishT:a.prog));
  if(S.mode==='pace'){
    for(const c of S.cars) if(c.lap >= 0){          // leader took the green
      S.mode='race'; S.greenT = 2.2; S.greenLockT = 12;
      break;
    }
  }
  if(S.greenLockT > 0 && S.flag==='green') S.greenLockT -= DT;
  if(S.mode==='qual' && S.player.lap >= 1){         // flying lap complete
    S.mode='menuwait';                              // brief freeze before the race grid forms
    setTimeout(()=> finishQualifying(S.player.lastLapT), 400);
  }
  // ---- AI pit strategy: yellow on worn tires/low fuel, or desperate on green ----
  if(S.mode==='race'){
    for(const c of S.cars){
      if(c.isPlayer || c.done || c.out || c.pit>0 || c.spinT>0) continue;
      // under yellow, strategy stops wait for pit road to open (green-flag
      // desperation stops — wear/fuel/damage — are always allowed)
      c.pitReq = (S.flag==='yellow' && S.pitsOpen && (c.wear>0.25 || c.fuel<0.5))
               || c.wear>0.7 || c.fuel<0.18 || (c.dmg>0.45 && c.dmg<1);
    }
  }
  // ---- blowouts and DNFs ----
  if(S.mode==='race' || S.mode==='victory'){
    for(const c of S.cars){
      if(c.done || c.out || c.pit>0) continue;
      // worn-out tire can let go at any time (real, flag-agnostic) -- but the
      // actual uncontrolled spin is gated to green-flag racing only, same
      // gate the collide()-based spin roll uses (S.flag==='green' &&
      // S.greenLockT<=0). Under yellow the whole field (including the
      // player) is fully computer-driven, single-file, at 9-unit gaps -- a
      // seized-steering spin there has nowhere to go but through the car
      // behind. The event itself still fires under yellow: the existing
      // grip penalty (muSurf *0.7 below) and forced crawl-to-30 clamp still
      // make the car visibly limp, and the pit-strategy AI's wear reaction
      // above is untouched. Re-trigger guard switched from c.spinT<=0 to
      // !c.blown, since spinT is never set under yellow now -- the old
      // guard would otherwise let this re-roll every tick indefinitely
      // once a car is blown-but-not-spun.
      if(c.wear > 0.92 && !c.blown && c.v > 25 && rngR() < 0.0004){
        c.blown = true;
        c.hitFx = 1;
        if(c.isPlayer) spotterSay('FLAT TIRE — PIT NOW!');
        if(S.flag==='green' && S.greenLockT<=0){
          c.spinT = 1.8; c.spinDir = rngR()<0.5?-1:1; c.spinCd = 10;
        }
      }
      // terminal damage: pull off and park (DNF)
      if(c.dmg >= 1 && !c.out){
        c.out = true;
        if(c.isPlayer) spotterSay('TOO MUCH DAMAGE — WE’RE DONE');
      }
    }
  }
  // ---- caution controller ----
  if(S.mode==='race'){
    if(S.flag==='green'){
      for(const c of S.cars){
        if(c.spinT > 0 && !c.done){                 // wreck on track → yellow
          S.flag='yellow'; S.yellowT = 0;
          const lead = activeLead();
          S.cautionUntilLap = lead.lap + 2;
          PACE.state='lead'; PACE.lat=0; PACE.v=38;
          PACE.s = (lead.s + 90) % TRACK.total;
          // freeze the field into pacing slots by PHYSICAL position behind
          // the pace car (not by running order): the single-file queue has
          // no passing, so a prog-ordered slot a car can't physically reach
          // past the cars in front of it would leave permanent stragglers.
          // Physical order means every car's slot is roughly where it
          // already is — the queue just compresses. (Also period-authentic:
          // the pre-2004 single-file era lined cars up where they ran, and
          // scoring position comes from prog, never from the line order.)
          const act = S.cars.filter(o => !o.out && !o.done);
          act.sort((a,b)=>{
            const da = ((PACE.s - a.s) % TRACK.total + TRACK.total) % TRACK.total;
            const db = ((PACE.s - b.s) % TRACK.total + TRACK.total) % TRACK.total;
            return da - db;
          });
          act.forEach((o,i)=>{ o.cautionSlot = i; });
          S.cautionMaxSlot = act.length - 1;
          S.oneToGo = false;
          S.pitsOpen = false;                        // closed until field is collected
          if(CAR_MAT_AMBER) CAR_MAT_AMBER.emissiveIntensity = 1.2;   // pace lights on
          break;
        }
      }
    } else if(S.flag==='yellow'){
      S.yellowT += DT;
      stepPace();
      // adaptive pace speed: the pace car is kinematic (fixed 38 through
      // corners) while the field is physics-bound and loses ground in every
      // decel wave — at a fixed 38 the whole queue lagged the schedule by
      // 300+ units and could never "bunch". Slow down proportionally to the
      // front-of-queue gap so the pace car actually waits for the field,
      // like a real one does.
      {
        let front = null, best = 1e9;
        for(const o of S.cars){
          if(o.out || o.done || o.pit!==0 || o.spinT>0) continue;
          if(o.cautionSlot >= 0 && o.cautionSlot < best){ best = o.cautionSlot; front = o; }
        }
        if(front){
          let gap = PACE.s - 16 - front.cautionSlot*9 - front.s;
          while(gap < -TRACK.total/2) gap += TRACK.total;
          while(gap >  TRACK.total/2) gap -= TRACK.total;
          PACE.v = 38 - Math.max(0, Math.min(16, (gap - 24)*0.15));
        } else PACE.v = 38;
      }
      // NOTE: there used to be a "passed under yellow" penalty check here for
      // the player. It made sense back when the player kept manual control
      // (just speed-capped) during caution, since a human could deliberately
      // out-drive the field to gain track position. Now that the computer
      // fully drives the player under yellow — identical single-file pacing
      // logic to every AI car — the player can no longer manually cheat, and
      // the natural rank "noise" from gap/bunching dynamics (which AI cars
      // experience amongst themselves all the time, unpenalized) started
      // false-triggering drive-through penalties on totally fair restarts.
      const lead = activeLead();
      // "bunched" = every car is at (or near) its assigned pacing slot. Slots
      // give an exact per-car target, so this is a direct error measure
      // instead of the old adjacent-gap heuristic. A couple of outliers are
      // tolerated: a meaningfully damaged car has a genuinely lower top
      // speed (see updateAero/engine-power scaling) and can be a straggler
      // no catch-up speed can fix short of pitting for repairs — one busted
      // car must not hold the entire restart hostage. Pitted cars excluded
      // (frozen s during service; they re-slot at the tail on exit). The
      // 45s hard cap guarantees caution can't hang forever regardless.
      // slot compaction: cars that duck into the pits leave their old slot
      // as a 9-unit hole in the queue, and a full-field pit cycle (16+ cars
      // at once) also inflates the tail with ++maxSlot assignments — without
      // compaction the queue ends up sparse and hundreds of units long, and
      // the bunch gate below can never pass. Re-number the active queue
      // 0..n-1 every tick (order-preserving sort by current slot; 20 cars,
      // trivial cost) so holes close as soon as they open.
      const activeY = S.order.filter(o => !o.out && !o.done && o.pit===0);
      activeY.slice().sort((a,b)=>a.cautionSlot-b.cautionSlot).forEach((o,i)=>{ o.cautionSlot = i; });
      S.cautionMaxSlot = activeY.length - 1;
      // time-compressed collection: a green-flag spread can be 700+ units,
      // and the physics-bound tail closes it at only ~15-25/s — genuinely
      // converging the whole field takes 60-90 sim-seconds, most of a
      // 2-lap caution. The fast-forward window is presentation-compressed
      // anyway (the player watches it at 8x, workstream-B TV cuts cover
      // it), so after a fair convergence window the far stragglers are
      // warped into their slots. FORWARD only: a forward warp across the
      // finish line reads as a legitimate (compressed) crossing and lap
      // counting stays correct, while a backward warp would corrupt prog.
      // Never the player (their camera would visibly jump); never during
      // one-to-go (that plays at 1x).
      if(S.yellowT > 40 && !S.oneToGo){
        for(const o of activeY){
          if(o.isPlayer || o.spinT > 0) continue;
          let se = (PACE.s - 16 - o.cautionSlot*9) - o.s;
          while(se < -TRACK.total/2) se += TRACK.total;
          while(se >  TRACK.total/2) se -= TRACK.total;
          if(se > 30){
            const sNew = ((o.s + se) % TRACK.total + TRACK.total) % TRACK.total;
            // the queue "sloshes" +-10-20 units around the ideal slot
            // schedule (chained speed control has finite damping -- see the
            // 25-unit "bunched" tolerance below), so the car actually
            // holding the slot ahead/behind on any given tick can be well
            // off its theoretical position. Landing sNew blindly could warp
            // this car to within collide()'s 3.6-unit contact radius of a
            // real car that's currently running behind schedule -- a sudden
            // teleport-into-occupied-space overlap, which collide()'s push/
            // velocity-delta slowdown (both flag-agnostic) then resolves
            // violently: reads exactly like a crash even though spinT never
            // fires. Skip the warp this tick if it would land too close to
            // any other active car; positions keep evolving every tick, so
            // it retries on a later tick once the way is actually clear.
            let clear = true;
            for(const other of activeY){
              if(other===o) continue;
              let dso = Math.abs(other.s - sNew);
              if(dso > TRACK.total/2) dso = TRACK.total - dso;
              if(dso < 12){ clear = false; break; }
            }
            if(clear){
              const p = TRACK.pointAt(sNew);
              o.s = sNew; o.lat = 0;
              o.x = p.x; o.y = p.y;
              o.hdg = o.vdir = p.hdg; o.v = 38;
              o.px = o.x; o.py = o.y; o.phdg = o.hdg; o.ps = o.s; o.plat = 0;
            }
          }
        }
      }
      let stragglers = 0;
      for(const o of activeY){
        let se = (PACE.s - 16 - o.cautionSlot*9) - o.s;
        while(se < -TRACK.total/2) se += TRACK.total;
        while(se >  TRACK.total/2) se -= TRACK.total;
        // 25-unit tolerance: the queue naturally sloshes ±10-20 around the
        // slot schedule (chained speed control has finite damping); a line
        // running 20 units "behind schedule" is still visually a perfect
        // single file, which is what the restart actually needs.
        if(Math.abs(se) > 25) stragglers++;
      }
      const bunched = stragglers <= 3;
      // pit road opens once the field is collected (NASCAR procedure —
      // closed at caution-out so nobody gains by diving in before the
      // field is under control)
      if(!S.pitsOpen && !S.oneToGo && bunched){
        S.pitsOpen = true;
        S.msgTxt = 'PIT ROAD IS OPEN'; S.msgT = 2.5;
      }
      if(!S.oneToGo){
        // 75s cap: bunching physically takes time — corner grip limits real
        // catch-up speed to ~55-60, so a 600-unit caution-out spread needs
        // ~30-40 sim-seconds to compress. Under 8x fast-forward this cap is
        // still under ~10 real seconds; it exists only to stop pathological
        // hangs (e.g. a car that keeps spinning), not as the normal path.
        // The lead.lap>=cautionUntilLap half had NO time-based fallback of
        // its own (unlike bunched) until a green-white-checkered saga with
        // several extension/abort cycles surfaced a real hang: "lead" can
        // legitimately point to a different, less-advanced active car later
        // in a long GWC saga than the one cautionUntilLap was computed
        // against, so the lap-count target can end up permanently out of
        // that car's reach. 120s is a generous ceiling (still ~15s of real
        // time under the 8x caution fast-forward) that guarantees this gate
        // can't hang regardless of which car "lead" ends up being.
        if((lead.lap >= S.cautionUntilLap || S.yellowT > 120) && S.yellowT > 8 && (bunched || S.yellowT > 75)){
          // field collected and caution laps served: one to go. Lights off,
          // pit road closes, fast-forward ends (frame() checks oneToGo) so
          // the player watches the restart build at normal speed.
          S.oneToGo = true;
          S.pitsOpen = false;
          if(CAR_MAT_AMBER) CAR_MAT_AMBER.emissiveIntensity = 0.15;
          // hard cut from the caution TV montage's last static pad straight
          // to the live chase cam: the montage (updateCamera(), gated on
          // !S.oneToGo) already stops the instant oneToGo flips true, same
          // as the fast-forward above, but without this the normal SMOOTHED
          // chase-cam block would glide from wherever the montage last
          // parked the camera (up to a 40-unit-high aerial shot) instead of
          // cutting -- reusing the same snap-instead-of-glide idiom already
          // used by startRace()/startQualifying() (cam.pos=null triggers
          // updateCamera()'s self-init guard to snap straight to target).
          cam.pos = null;
        }
      } else {
        // pace car pulls into the pits at the pit-entry zone, then green as
        // the leader reaches the line zone (restart zone), pace car clear
        if(PACE.state==='lead'){
          let dEntry = (TRACK.segs[0].s0 - 25) - PACE.s;
          while(dEntry < -TRACK.total/2) dEntry += TRACK.total;
          while(dEntry >  TRACK.total/2) dEntry -= TRACK.total;
          if(Math.abs(dEntry) < 4) PACE.state='peel';
        }
        let dl = (TRACK.sFinish - lead.s + TRACK.total) % TRACK.total;
        if(PACE.state!=='lead' && (dl < 60 || dl > TRACK.total-10)){
          S.flag='green'; S.greenT = 2.2; S.greenLockT = 20;
          S.oneToGo = false; S.pitsOpen = true;
          PACE.state='peel';
        }
      }
    }
  }
  // ---- green-white-checkered: the race must never end under yellow. If
  // the leader would complete the scheduled final lap while caution is out,
  // extend: let the (unmodified) caution controller above bunch the field
  // and throw green as normal, require one full lap with no new caution,
  // then one more lap to the checkered flag. A fresh caution during either
  // extra lap aborts back to the top and retries, bounded at
  // GWC_MAX_ATTEMPTS -- in the astronomically rare case all attempts fail,
  // the unconditional arbitration pass below ends the race at the current
  // lap regardless of flag, as a safety valve. ----
  if(S.mode==='race'){
    // activeLead(), not S.order[0]: once the actual fastest car has legally
    // finished (reached finishLaps under green), later incidents among the
    // trailing pack are just normal racing for lower positions and must not
    // reopen "did the race end under yellow" using that car's now-frozen
    // lap count (same reasoning as the caution controller's own lead fix).
    const gwcLead = activeLead();
    if(gwcLead && !gwcLead.done && !gwcLead.out){
      if(S.gwcState==='none'){
        if(S.flag==='yellow' && gwcLead.lap >= S.finishLaps){
          if(S.gwcAttempts < GWC_MAX_ATTEMPTS){
            S.finishLaps += 1;
            S.gwcState = 'watch';
            S.gwcAttempts++;
            S.msgTxt = 'OVERTIME — GREEN WHITE CHECKERED'; S.msgT = 3.2;
          } else {
            // safety valve, actually implemented: retries are exhausted and
            // gwcLead is STILL stuck reaching a stale extended finishLaps
            // target under yellow -- without this, finishLaps stays frozen
            // at whatever attempt 8 last set it to, and the "unconditional"
            // arbitration pass right below can in fact never fire (it only
            // triggers once some car's lap reaches finishLaps, which never
            // happens if gwcLead keeps getting caught by a fresh caution
            // before getting there), hanging the race forever. Pull the
            // target back down to gwcLead's actual current lap so that same
            // arbitration pass ends the race THIS tick, regardless of flag,
            // exactly as the comment above already promised.
            S.finishLaps = gwcLead.lap;
          }
        }
      } else if(S.gwcState==='watch'){
        // caution controller above runs untouched; if it runs long enough
        // that the leader organically laps past the extended target while
        // STILL under yellow, keep pushing the target out ahead of them
        if(S.flag==='yellow' && gwcLead.lap >= S.finishLaps) S.finishLaps = gwcLead.lap + 1;
        if(S.flag==='green'){
          // the restart itself immediately crosses the leader's lap counter
          // by +1: the restart-timing check a few lines up throws green
          // once the leader is WITHIN 60 units of the stripe (approaching
          // it, not yet across), so within a second or two of taking the
          // green they physically cross the line and their lap count ticks
          // over -- that crossing is the restart itself, not a lap of green
          // racing. Mark here, then require +2 (not +1) in 'clean1' below to
          // skip that artifact crossing and demand one genuine full lap.
          S.gwcMarkLap = gwcLead.lap;
          S.finishLaps = gwcLead.lap + 3;      // +1 restart-crossing artifact, +1 clean lap, +1 checkered lap
          S.gwcState = 'clean1';
        }
      } else if(S.gwcState==='clean1'){
        if(S.flag==='yellow'){
          S.gwcState = 'none';                 // fresh caution mid-clean-lap: abort, retry from the top
        } else if(gwcLead.lap >= S.gwcMarkLap + 2){
          S.finishLaps = gwcLead.lap + 1;      // clean lap done: exactly one more lap to the checkered flag
          S.gwcState = 'white';
          S.msgTxt = 'WHITE FLAG — FINAL LAP'; S.msgT = 2.8;
        }
      } else if(S.gwcState==='white'){
        if(S.flag==='yellow') S.gwcState = 'none';   // fresh caution mid-white-flag-lap: abort, retry
        // otherwise the arbitration pass below ends the race naturally once finishLaps is reached under green
      }
    }
    // unconditional finish arbitration -- runs after the caution and GWC
    // controllers above so a car crossing the line this tick sees this
    // tick's final S.flag/S.finishLaps, not stale values from before a
    // fresh incident (see the note left in stepCar() where this used to live)
    for(const c of S.cars){
      // !c.out: a car already retired for terminal damage can still be
      // limping across the stripe when its lap count ticks over (it doesn't
      // stop instantly) — without this guard it would get marked done and
      // ranked as a finisher via S.finishOrder while still carrying the
      // `out` flag, so the results screen displayed "DNF" for a car sitting
      // ahead of real finishers in the standings.
      if(!c.done && !c.out && c.lap >= S.finishLaps){ c.done = true; c.finishT = S.t; S.finishOrder.push(c); }
    }
  }
  if(S.greenT>0) S.greenT -= DT;
  if(S.msgT>0) S.msgT -= DT;
  if(S.spotT>0) S.spotT -= DT;
  // spotter: alongside calls + laps-to-go
  if(S.mode==='race' && !S.player.done && S.player.pit===0){
    const P2 = S.player;
    let inside=false, outside=false;
    for(const o of S.cars){
      if(o===P2 || o.done || o.pit>0) continue;
      let ds = o.s - P2.s; if(ds<-TRACK.total/2)ds+=TRACK.total; if(ds>TRACK.total/2)ds-=TRACK.total;
      if(Math.abs(ds) < 5.5 && Math.abs(o.lat-P2.lat) < 3.4){
        if(o.lat < P2.lat) inside=true; else outside=true;
      }
    }
    if(inside && S.spotState!=='in'){ spotterSay(outside?'THREE WIDE!':'INSIDE!'); S.spotState='in'; }
    else if(outside && !inside && S.spotState!=='out'){ spotterSay('OUTSIDE!'); S.spotState='out'; }
    else if(!inside && !outside && (S.spotState==='in'||S.spotState==='out')){ spotterSay('CLEAR'); S.spotState='clear'; }
    if(P2.lap === S.laps-3 && S.togoMsg!==1 && S.laps>=6){ S.togoMsg=1; spotterSay('3 TO GO'); }
    if(P2.fuel < 0.15 && S.fuelMsg!==1){ S.fuelMsg=1; spotterSay('FUEL LOW — PIT SOON'); }
    if(P2.wear > 0.85 && S.tireMsg!==1){ S.tireMsg=1; spotterSay('TIRES ARE GONE'); }
    if(P2.dmg > 0.6 && S.dmgMsg!==1){ S.dmgMsg=1; spotterSay('HEAVY DAMAGE — PIT FOR REPAIRS'); }
  }
  // broadcast pop-ups: fastest lap, halfway, white flag
  if(S.mode==='race'){
    for(const c of S.cars){
      if(c.lastLapT>0 && (!S.fastLap || c.lastLapT < S.fastLap - 0.005) && c.lap>=1){
        if(S.fastLap){ S.msgTxt='FASTEST LAP — #'+c.num+' '+fmtT(c.lastLapT); S.msgT=2.6; }
        S.fastLap = c.lastLapT;
      }
    }
    const pl = S.player.lap;
    if(pl === Math.ceil(S.laps/2) && S.halfMsg!==1 && S.laps>=4){ S.halfMsg=1; S.msgTxt='HALFWAY — LAP '+pl+' OF '+S.laps; S.msgT=2.6; }
    if(pl === S.laps-1 && S.whiteMsg!==1){ S.whiteMsg=1; S.msgTxt='WHITE FLAG — FINAL LAP'; S.msgT=2.8; }
  }
  if(S.player.done && S.mode==='race'){
    if(S.finishOrder[0]===S.player){                // winner: burnout celebration first
      S.mode='victory'; S.victoryT = 0;
    } else {
      S.mode='done'; setTimeout(showResults, 900);
    }
  }
  if(S.player.out && S.mode==='race' && S.player.v < 1){   // player DNF: race over once parked
    S.mode='done'; setTimeout(showResults, 1200);
  }
  if(S.mode==='victory'){
    S.victoryT += DT;
    if(S.victoryT > 6){ S.mode='done'; setTimeout(showResults, 600); }
  }
}

/* ---------- UI wiring ---------- */
async function enterLandscapeFullscreen(){
  try{
    const el = document.documentElement;
    if(el.requestFullscreen) await el.requestFullscreen();
    if(screen.orientation && screen.orientation.lock) await screen.orientation.lock('landscape');
  }catch(e){ /* not fatal — CSS rotate prompt covers it */ }
}
function startRace(){
  document.getElementById('qSkip').style.display='none';
  gridStart();
  cam.pos=null;
  S.fastLap = 0; S.halfMsg = 0; S.whiteMsg = 0; S.msgT = 0; S.msgTxt = '';
  S.spotT = 0; S.spotTxt = ''; S.spotState = 'clear'; S.togoMsg = 0;
  S.fuelMsg = 0; S.tireMsg = 0; S.penaltyT = 0;
  S.oneToGo = false; S.pitsOpen = true; S.cautionMaxSlot = -1;
  S.finishLaps = S.laps; S.gwcState = 'none'; S.gwcAttempts = 0; S.gwcMarkLap = -1;
  if(CAR_MAT_AMBER) CAR_MAT_AMBER.emissiveIntensity = 1.2;
  S.mode='pace';
}
function startQualifying(){
  // solo flying lap: out-lap run-up to the line, then one timed lap
  S.cars = [makeCar(true, 0)];
  S.player = S.cars[0];
  const c = S.player;
  const s0 = TRACK.sFinish - 220 + TRACK.total;
  const p = TRACK.pointAt(s0);
  c.x = p.x; c.y = p.y; c.hdg = c.vdir = p.hdg; c.s = s0 % TRACK.total;
  c.v = 45; c.lap = -1;
  c.px=c.x; c.py=c.y; c.phdg=c.hdg; c.ps=c.s; c.plat=c.lat;
  S.finishOrder = []; S.order = [c];
  S.t = 0; S.flag='green'; S.greenT = 0;
  PACE.state = 'none';                 // no pace car on a qual run
  cam.pos = null;
  S.mode = 'qual';
  document.getElementById('qSkip').style.display='block';
}
function finishQualifying(time){
  // build the grid: AI times synthesized around the player's lap (skill-spread);
  // no time (skip) puts the player at the back
  const entries = [];
  for(let i=1;i<FIELD;i++){
    const skill = 0.90 + rngR()*0.085;
    const t = (time||60) * (0.985 + (1-skill)*0.45 + rngR()*0.012);
    entries.push({idx:i, t});
  }
  entries.push({idx:0, t: time || 1e9});
  entries.sort((a,b)=>a.t-b.t);
  S.gridOrder = entries.map(e=>e.idx);
  S.qualPos = S.gridOrder.indexOf(0)+1;
  startRace();
}
document.getElementById('qSkip').addEventListener('click', ()=> finishQualifying(null));
document.getElementById('startBtn').addEventListener('click', async ()=>{
  await enterLandscapeFullscreen();
  if(S.tilt && window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission){
    try{ await DeviceOrientationEvent.requestPermission(); }catch(e){}
  }
  audioInit();
  document.getElementById('menu').style.display='none';
  document.getElementById('results').style.display='none';
  S.gridOrder = null; S.qualPos = 0;
  if(S.qual) startQualifying(); else startRace();
});
document.getElementById('qualTog').addEventListener('click', e=>{
  S.qual=!S.qual; e.target.textContent='QUALIFYING: '+(S.qual?'ON':'OFF');
});
const bPitEl = document.getElementById('bP');
bPitEl.addEventListener('click', ()=>{
  const P = S.player;
  if(!P || S.mode!=='race' || P.done) return;
  if(P.pit===0){ P.pitReq = !P.pitReq; bPitEl.classList.toggle('pressed', P.pitReq); }
});
function refreshPitBtn(){
  const P = S.player;
  const show = S.mode==='race' && P && !P.done;
  bPitEl.style.display = show ? 'flex' : 'none';
  if(show) bPitEl.classList.toggle('pressed', !!(P.pitReq || P.pit));
}
document.getElementById('againBtn').addEventListener('click', ()=>{
  document.getElementById('results').style.display='none';
  document.getElementById('menu').style.display='flex';
  S.mode='menu';
});
document.getElementById('sndTog').addEventListener('click', e=>{
  S.sound=!S.sound; e.target.textContent='SOUND: '+(S.sound?'ON':'OFF');
});
document.getElementById('tiltTog').addEventListener('click', e=>{
  S.tilt=!S.tilt; e.target.textContent='TILT STEER: '+(S.tilt?'ON':'OFF');
});
document.getElementById('lapTog').addEventListener('click', e=>{
  S.laps = S.laps===3?5:S.laps===5?10:S.laps===10?20:3;
  e.target.textContent='LAPS: '+S.laps;
});
let trackIdx = 0;
function selectTrack(i){
  trackIdx = ((i % TRACKS.length) + TRACKS.length) % TRACKS.length;
  TRACK = buildTrack(TRACKS[trackIdx]);
  WORLD = null; WORLD_TEX = null; MMPTS = null;      // rebuilt lazily for the new geometry
  GROOVE_IDX = []; STAND_ZONES = []; lastRubberStep = -1;
  FLAG_POS = null;
  if(FLAGMESH){ scene.remove(FLAGMESH); FLAGMESH = null; }
  document.getElementById('trkTog').textContent = 'TRACK: ' + TRACK.name;
  document.getElementById('trackSub').innerHTML = TRACK.name + ' &bull; ' + TRACK.sub;
}
document.getElementById('trkTog').addEventListener('click', ()=> selectTrack(trackIdx+1));
document.addEventListener('visibilitychange', ()=>{ last=0; acc=0; });
if(!gl){
  document.getElementById('glFail').style.display='flex';
}
requestAnimationFrame(frame);

// playtest/tooling compat shim — now that this is a module script, top-level
// bindings are module-scoped, not window properties like a classic script.
// tools/playtest.js's page.evaluate() closures reference these as bare
// identifiers, so they need to stay reachable as window globals.
// TRACK is reassigned (not just mutated) by selectTrack(), so a plain
// Object.assign snapshot would go stale after a track switch — use a live
// getter for it. S/input/tick/selectTrack/frame are never reassigned
// (S/input are `const` object literals, only their properties mutate), so a
// plain copy is safe for those.
Object.defineProperty(window, 'TRACK', { get: () => TRACK, configurable: true });
Object.assign(window, { S, tick, selectTrack, input, frame });
